<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>أقرب وكلاء رايماكس</title>

<style>

body{
font-family:tahoma;
background:#f5f5f5;
padding:15px;
}

.card{
background:#fff;
padding:15px;
margin-bottom:15px;
border-radius:12px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.name{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.address{
margin-bottom:10px;
}

.phone{
margin-bottom:10px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
padding:10px 15px;
border:none;
border-radius:8px;
text-decoration:none;
color:#fff;
cursor:pointer;
}

.call{
background:#28a745;
}

.whatsapp{
background:#25d366;
}

.map{
background:#007bff;
}

</style>

</head>

<body>

<h2>أقرب وكلاء زيوت رايماكس</h2>

<div id="results">
جاري تحديد الموقع...
</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycby9AXIUB6H96VD2WtjJk_58mmrdogzH3kobbUyMd3TF9WNcdavAuvnAC4SSQqijPtsy/exec";

let userLat;
let userLng;

navigator.geolocation.getCurrentPosition(

async function(pos){

userLat=pos.coords.latitude;
userLng=pos.coords.longitude;

loadData();

},

function(){

document.getElementById("results").innerHTML=
"يرجى السماح بالوصول إلى الموقع";

}

);

function distance(lat1,lon1,lat2,lon2){

const R=6371;

const dLat=(lat2-lat1)*Math.PI/180;
const dLon=(lon2-lon1)*Math.PI/180;

const a=
Math.sin(dLat/2)*Math.sin(dLat/2)+
Math.cos(lat1*Math.PI/180)*
Math.cos(lat2*Math.PI/180)*
Math.sin(dLon/2)*Math.sin(dLon/2);

const c=2*Math.atan2(
Math.sqrt(a),
Math.sqrt(1-a)
);

return R*c;

}

async function loadData(){

const response=await fetch(API_URL);
const dealers=await response.json();

dealers.forEach(d=>{

d.distance=distance(
userLat,
userLng,
parseFloat(d.lat),
parseFloat(d.lng)
);

});

dealers.sort((a,b)=>a.distance-b.distance);

const nearest=dealers.slice(0,3);

render(nearest);

}

function render(list){

let html="";

list.forEach(item=>{

const clientMap=
`https://maps.google.com/?q=${item.lat},${item.lng}`;

html+=`

<div class="card">

<div class="name">
${item.name}
</div>

<div class="address">
${item.address}
</div>

<div class="phone">
${item.phone}
</div>

<div>
المسافة:
${item.distance.toFixed(1)}
كم
</div>

<br>

<div class="buttons">

<a
class="btn call"
href="tel:${item.phone}"
onclick="saveAction('Call',this)"
data-name="${item.name}"
data-phone="${item.phone}"
data-address="${item.address}"
data-lat="${item.lat}"
data-lng="${item.lng}"
>
اتصال
</a>

<a
class="btn whatsapp"
href="https://wa.me/${item.phone}"
target="_blank"
onclick="saveAction('WhatsApp',this)"
data-name="${item.name}"
data-phone="${item.phone}"
data-address="${item.address}"
data-lat="${item.lat}"
data-lng="${item.lng}"
>
واتساب
</a>

<a
class="btn map"
href="${clientMap}"
target="_blank"
onclick="saveAction('Map',this)"
data-name="${item.name}"
data-phone="${item.phone}"
data-address="${item.address}"
data-lat="${item.lat}"
data-lng="${item.lng}"
>
الخريطة
</a>

</div>

</div>

`;

});

document.getElementById("results").innerHTML=html;

}

function saveAction(action,el){

const clientLat=el.dataset.lat;
const clientLng=el.dataset.lng;

const data={

action:action,

name:el.dataset.name,

phone:el.dataset.phone,

address:el.dataset.address,

clientLat:clientLat,
clientLng:clientLng,

userLat:userLat,
userLng:userLng,

clientMap:
`https://maps.google.com/?q=${clientLat},${clientLng}`,

userMap:
`https://maps.google.com/?q=${userLat},${userLng}`

};

fetch(API_URL,{
method:"POST",
body:JSON.stringify(data)
});

}

</script>

</body>

</html>
