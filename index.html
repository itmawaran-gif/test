<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketing Department Statistics</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:      #07090f;
    --bg2:     #0c1020;
    --bg3:     #111827;
    --border: rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.12);
    --red:     #ff4d6d;
    --amber:   #ffb347;
    --cyan:    #00e5ff;
    --purple:  #b06eff;
    --green:   #00e676;
    --pink:    #ff6eb4;
    --blue:    #4fc3f7;
    --teal:    #26ffb8;
    --orange:  #ff8c42;
    --text:    #e8eaf0;
    --muted:   #6b7280;
    --dim:     #374151;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }

  /* HEADER */
  .header{
    position:relative;z-index:10;
    background:linear-gradient(180deg,rgba(10,12,24,0.98),rgba(10,12,24,0.85));
    border-bottom:1px solid var(--border2);padding:18px 36px;
    display:flex;align-items:center;justify-content:space-between;
    backdrop-filter:blur(20px);
  }
  .header-brand{display:flex;align-items:center;gap:14px;}
  .brand-icon{
    width:44px;height:44px;
    background:linear-gradient(135deg,var(--purple),var(--cyan));
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;flex-shrink:0;
  }
  .brand-text h1{
    font-size:1.15rem;font-weight:900;letter-spacing:.02em;
    background:linear-gradient(90deg,#c084fc,#67e8f9);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;
  }
  .brand-text p{font-size:.7rem;color:var(--muted);font-weight:500;letter-spacing:.04em;}
  .header-meta{text-align:left;font-size:.72rem;color:var(--muted);line-height:1.7;}
  .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--green);margin-left:6px;animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

  /* CONTAINER */
  .container{
    position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:36px 24px 60px;
  }

  /* SECTION HEADER */
  .sec-header{display:flex;align-items:center;gap:14px;margin:40px 0 22px;}
  .sec-icon{
    width:46px;height:46px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;
  }
  .sec-icon.purple {background:rgba(176,110,255,.15);box-shadow:0 0 20px rgba(176,110,255,.2);}
  .sec-icon.green  {background:rgba(0,230,118,.12); box-shadow:0 0 20px rgba(0,230,118,.15);}
  .sec-icon.orange {background:rgba(255,140,66,.12); box-shadow:0 0 20px rgba(255,140,66,.15);}
  .sec-header h2{font-size:2rem;font-weight:900;letter-spacing:.03em;}
  .sec-header h2.purple{color:#c084fc;}
  .sec-header h2.green {color:#86efac;}
  .sec-header h2.orange{color:var(--orange);}
  .sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

  /* JOB SECTION STYLES */
  .job-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    background: var(--bg3);
    padding: 15px 25px;
    border-radius: 15px;
    border: 1px solid var(--border);
  }
  .job-controls input[type="date"] {
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    padding: 8px 15px;
    border-radius: 8px;
    font-family: inherit;
    outline: none;
  }
  .table-container {
    overflow-x: auto;
    background: var(--bg3);
    border-radius: 18px;
    border: 1px solid var(--border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    min-width: 800px;
  }
  th, td {
    padding: 15px;
    text-align: center;
    border: 1px solid var(--border);
  }
  th.emp-name {
    background: rgba(176,110,255,0.1);
    color: var(--purple);
    font-size: 1.1rem;
    font-weight: 800;
  }
  th.sub-head {
    background: var(--bg2);
    color: var(--muted);
    font-size: 0.85rem;
    text-transform: uppercase;
  }
  tr:hover td {
    background: rgba(255,255,255,0.02);
  }

  /* REUSE EXISTING STYLES */
  .compare-group, .sponsor-block, .compare-card { animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:700px){
    .compare-row{grid-template-columns:1fr;}
    .sponsor-body{grid-template-columns:repeat(2,1fr);}
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">🎬</div>
    <div class="brand-text">
      <h1>Marketing Department Statistics</h1>
      <p>Production Dashboard · Real-time Stats</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="dot"></span>
    <span id="updateTime">Loading...</span><br/>
  </div>
</header>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>جاري تحميل البيانات...</p>
  </div>
</div>

<script>
google.charts.load('current', {'packages':['corechart', 'table']});
google.charts.setOnLoadCallback(loadData);

const sheetID = "17I1gZX_N0_0QdswT6Hc13LJRezyz23J6v4aLjIeru8Q";
const DATA = {};
let doneCalls = 0;
let totalCalls = 0;

// الحصول على تاريخ الأمس بتنسيق YYYY-MM-DD
function getYesterdayDate() {
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    return yesterday.toISOString().split('T')[0];
}

function getValue(sheet, range, key) {
  totalCalls++;
  const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&range=${range}`);
  q.send(function(res) {
    try {
      const table = res.getDataTable();
      DATA[key] = (table && table.getNumberOfRows() > 0) ? table.getValue(0, 0) : '—';
    } catch(e) { DATA[key] = '—'; }
    checkFinished();
  });
}

// جلب بيانات صفحة Job
function fetchJobData(targetDate) {
  const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=job`);
  q.send(function(res) {
    if (res.isError()) {
      console.error('Error fetching job data');
      return;
    }
    const table = res.getDataTable();
    DATA['jobRaw'] = table;
    DATA['selectedDate'] = targetDate;
    checkFinished();
  });
}

function checkFinished() {
  doneCalls++;
  if (doneCalls >= totalCalls) renderUI();
}

function loadData() {
  totalCalls = 0; doneCalls = 0;
  
  // Sheet1 Values
  getValue("Sheet1","I8",  "vid_this");
  getValue("Sheet1","K8",  "vid_prev");
  getValue("Sheet1","I11", "dan_this");
  getValue("Sheet1","K11", "dan_prev");
  getValue("Sheet1","I14", "photo_this");
  getValue("Sheet1","K14", "photo_prev");
  
  // Sponsor Values
  getValue("Sponsore","H4","s_rymax");
  getValue("Sponsore","I4","s_mawaran");
  getValue("Sponsore","J4","s_rc");
  getValue("Sponsore","K4","s_client");
  getValue("Sponsore","L4","s_total");
  getValue("Sponsore","H8","p_rymax");
  getValue("Sponsore","I8","p_mawaran");
  getValue("Sponsore","J8","p_rc");
  getValue("Sponsore","K8","p_client");
  getValue("Sponsore","L8","p_total");

  // Job Data
  totalCalls++; 
  fetchJobData(getYesterdayDate());
}

function d(key) { return DATA[key] || '—'; }

function renderUI() {
  const now = new Date().toLocaleString('ar-IQ',{
    weekday:'short',year:'numeric',month:'short',day:'numeric',
    hour:'2-digit',minute:'2-digit'
  });
  document.getElementById('updateTime').textContent = now;

  let html = `
    <div class="sec-header">
      <div class="sec-icon purple">🎬</div>
      <h2 class="purple">Video Editing</h2>
      <div class="sec-line"></div>
    </div>
    <div class="compare-row">
        <div class="compare-card this-m">
            <div class="compare-card-head">📅 Edited this month</div>
            <div class="compare-card-body"><div class="cc-val">${d('vid_this')}</div></div>
        </div>
        <div class="compare-card prev-m">
            <div class="compare-card-head">🗓️ Edited Previous month</div>
            <div class="compare-card-body"><div class="cc-val">${d('vid_prev')}</div></div>
        </div>
    </div>

    <div class="section-divider"></div>

    <div class="sec-header">
      <div class="sec-icon green">📢</div>
      <h2 class="green">Sponsor Ads</h2>
      <div class="sec-line"></div>
    </div>
    <div class="sponsor-block sp-this">
      <div class="sponsor-head">📅 This Month</div>
      <div class="sponsor-body">
        <div class="sp-item"><div class="sp-label">Rymax</div><div class="sp-val">${d('s_rymax')}</div></div>
        <div class="sp-item"><div class="sp-label">Mawaran</div><div class="sp-val">${d('s_mawaran')}</div></div>
        <div class="sp-item"><div class="sp-label">RC</div><div class="sp-val">${d('s_rc')}</div></div>
        <div class="sp-item sp-total"><div class="sp-label">Total</div><div class="sp-val">${d('s_total')}</div></div>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="sec-header">
      <div class="sec-icon orange">💼</div>
      <h2 class="orange">Daily Jobs</h2>
      <div class="sec-line"></div>
    </div>

    <div class="job-controls">
        <span>عرض أعمال الموظفين ليوم:</span>
        <input type="date" id="jobDate" value="${DATA.selectedDate}" onchange="updateJobView(this.value)">
    </div>

    <div class="table-container">
        <table id="jobTable">${renderJobTable(DATA.selectedDate)}</table>
    </div>
  `;
  document.getElementById('app').innerHTML = html;
}

function renderJobTable(targetDate) {
  const dt = DATA.jobRaw;
  if (!dt) return "<tr><td>No data available</td></tr>";

  const numCols = dt.getNumberOfColumns();
  const numRows = dt.getNumberOfRows();
  
  // استخراج أسماء الموظفين (السطر الأول مدمج كل عمودين)
  let headerRow1 = "<tr>";
  let headerRow2 = "<tr>";
  
  // نفترض أن العمود A هو التاريخ والعمود B هو العمل للموظف الأول وهكذا
  // التنسيق: الموظف 1 (A,B)، الموظف 2 (C,D)...
  for (let j = 0; j < numCols; j += 2) {
    let empName = dt.getColumnLabel(j) || `Employee ${Math.floor(j/2)+1}`;
    headerRow1 += `<th colspan="2" class="emp-name">${empName}</th>`;
    headerRow2 += `<th class="sub-head">التاريخ</th><th class="sub-head">العمل</th>`;
  }
  headerRow1 += "</tr>";
  headerRow2 += "</tr>";

  // تصفية الصفوف بناءً على التاريخ المختار
  let bodyRows = "";
  let foundData = false;

  for (let i = 0; i < numRows; i++) {
    let rowHtml = "<tr>";
    let rowHasMatch = false;

    for (let j = 0; j < numCols; j += 2) {
      let cellDateValue = dt.getValue(i, j);
      let cellWorkValue = dt.getValue(i, j + 1) || "—";
      
      // تحويل تاريخ الخلية لمقارنته
      let formattedCellDate = "";
      if (cellDateValue instanceof Date) {
          formattedCellDate = cellDateValue.toISOString().split('T')[0];
      }

      if (formattedCellDate === targetDate) {
          rowHtml += `<td>${formattedCellDate}</td><td>${cellWorkValue}</td>`;
          rowHasMatch = true;
      } else {
          rowHtml += `<td>—</td><td>—</td>`;
      }
    }
    rowHtml += "</tr>";
    if (rowHasMatch) {
        bodyRows += rowHtml;
        foundData = true;
    }
  }

  if (!foundData) {
      bodyRows = `<tr><td colspan="${numCols}">لا توجد أعمال مسجلة لهذا التاريخ</td></tr>`;
  }

  return headerRow1 + headerRow2 + bodyRows;
}

function updateJobView(newDate) {
    const table = document.getElementById('jobTable');
    table.innerHTML = renderJobTable(newDate);
}
</script>
</body>
</html>
