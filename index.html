<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>لوحة إحصائيات الإنتاج</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:     #07090f;
    --bg2:    #0c1020;
    --bg3:    #111827;
    --border: rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.12);
    --red:    #ff4d6d;
    --amber:  #ffb347;
    --cyan:   #00e5ff;
    --purple: #b06eff;
    --green:  #00e676;
    --pink:   #ff6eb4;
    --blue:   #4fc3f7;
    --teal:   #26ffb8;
    --orange: #ff8c42;
    --text:   #e8eaf0;
    --muted:  #6b7280;
    --dim:    #374151;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }

  /* HEADER */
  .header{
    position:relative;z-index:10;
    background:linear-gradient(180deg,rgba(10,12,24,0.98),rgba(10,12,24,0.85));
    border-bottom:1px solid var(--border2);padding:18px 36px;
    display:flex;align-items:center;justify-content:space-between;
    backdrop-filter:blur(20px);
  }
  .header-brand{display:flex;align-items:center;gap:14px;}
  .brand-icon{
    width:44px;height:44px;
    background:linear-gradient(135deg,var(--purple),var(--cyan));
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;flex-shrink:0;
  }
  .brand-text h1{
    font-size:1.15rem;font-weight:900;letter-spacing:.02em;
    background:linear-gradient(90deg,#c084fc,#67e8f9);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;
  }
  .brand-text p{font-size:.7rem;color:var(--muted);font-weight:500;letter-spacing:.04em;}
  .header-meta{text-align:left;font-size:.72rem;color:var(--muted);line-height:1.7;}
  .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--green);margin-left:6px;animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

  /* CONTAINER */
  .container{
    position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:36px 24px 60px;
  }

  /* SECTION HEADER */
  .sec-header{display:flex;align-items:center;gap:14px;margin:40px 0 22px;}
  .sec-icon{
    width:46px;height:46px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;
  }
  .sec-icon.purple{background:rgba(176,110,255,.15);box-shadow:0 0 20px rgba(176,110,255,.2);}
  .sec-icon.green {background:rgba(0,230,118,.12); box-shadow:0 0 20px rgba(0,230,118,.15);}
  .sec-header h2{font-size:2rem;font-weight:900;letter-spacing:.03em;}
  .sec-header h2.purple{color:#c084fc;}
  .sec-header h2.green {color:#86efac;}
  .sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

  /* LOADING */
  .loading{text-align:center;padding:80px 20px;color:var(--muted);}
  .spinner{
    width:48px;height:48px;border:3px solid var(--dim);border-top-color:var(--purple);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-size:.95rem;}

  /* STATUS CARDS */
  .status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .status-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:18px;
    padding:28px 24px;text-align:center;position:relative;overflow:hidden;
    animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .status-card:hover{transform:translateY(-3px);}
  .status-card::after{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.06;}
  .status-card.s-red  {border-top:2px solid var(--red);}
  .status-card.s-amber{border-top:2px solid var(--amber);}
  .status-card.s-cyan {border-top:2px solid var(--cyan);}
  .status-card.s-red::after  {background:var(--red);}
  .status-card.s-amber::after{background:var(--amber);}
  .status-card.s-cyan::after {background:var(--cyan);}
  .status-glow{
    position:absolute;top:-20px;left:50%;transform:translateX(-50%);
    width:80px;height:80px;border-radius:50%;filter:blur(30px);opacity:.25;
  }
  .s-red   .status-glow{background:var(--red);}
  .s-amber .status-glow{background:var(--amber);}
  .s-cyan  .status-glow{background:var(--cyan);}
  .status-num{
    font-family:'Bebas Neue','Cairo',sans-serif;
    font-size:4.5rem;line-height:1;letter-spacing:.04em;margin-bottom:8px;position:relative;
  }
  .s-red   .status-num{color:var(--red);  text-shadow:0 0 30px rgba(255,77,109,.4);}
  .s-amber .status-num{color:var(--amber);text-shadow:0 0 30px rgba(255,179,71,.4);}
  .s-cyan  .status-num{color:var(--cyan); text-shadow:0 0 30px rgba(0,229,255,.4);}
  .status-label{font-size:.82rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}

  /* CLIENT CARDS */
  .clients-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px;}
  .client-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:16px;
    padding:20px 16px;text-align:center;animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .client-card:hover{transform:translateY(-2px);}
  .client-name{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
  .client-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:3rem;line-height:1;letter-spacing:.05em;}
  .cv-purple{color:var(--purple);text-shadow:0 0 20px rgba(176,110,255,.35);}
  .cv-blue  {color:var(--blue);  text-shadow:0 0 20px rgba(79,195,247,.35);}
  .cv-teal  {color:var(--teal);  text-shadow:0 0 20px rgba(38,255,184,.35);}
  .cv-orange{color:var(--orange);text-shadow:0 0 20px rgba(255,140,66,.35);}

  /* COMPARE */
  .compare-group{margin-top:24px;}
  .compare-label{
    font-size:1.1rem;font-weight:800;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .compare-label::before{content:'';width:16px;height:2px;background:var(--purple);border-radius:2px;display:inline-block;}
  .compare-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .compare-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .compare-card:hover{transform:translateY(-2px);}
  .compare-card-head{
    padding:14px 22px;font-size:1.1rem;font-weight:700;letter-spacing:.04em;
    display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);
  }
  .compare-card.this-m .compare-card-head{background:rgba(176,110,255,.10);color:#c084fc;}
  .compare-card.prev-m .compare-card-head{background:rgba(79,195,247,.08); color:var(--blue);}
  .compare-card-body{display:flex;align-items:center;justify-content:center;padding:24px;}
  .cc-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:4.2rem;line-height:1;letter-spacing:.04em;}
  .this-m .cc-val{color:var(--purple);text-shadow:0 0 22px rgba(176,110,255,.4);}
  .prev-m .cc-val{color:var(--blue);  text-shadow:0 0 22px rgba(79,195,247,.3);}

  /* SPONSOR */
  .sponsor-block{
    background:var(--bg3);border:1px solid var(--border);
    border-radius:18px;overflow:hidden;animation:fadeUp .5s ease both;
  }
  .sponsor-head{
    padding:16px 24px;font-size:1.15rem;font-weight:800;letter-spacing:.04em;
    display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);
  }
  .sponsor-block.sp-this .sponsor-head{background:rgba(0,230,118,.08);color:var(--green);}
  .sponsor-block.sp-prev .sponsor-head{background:rgba(255,179,71,.08); color:var(--amber);}
  .sponsor-body{display:grid;grid-template-columns:repeat(5,1fr);padding:22px 24px;gap:8px;}
  .sp-item{text-align:center;padding:8px 4px;}
  .sp-label{font-size:.9rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .sp-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:2.8rem;line-height:1;letter-spacing:.04em;}
  .sp-this .sp-val{color:var(--green);text-shadow:0 0 18px rgba(0,230,118,.3);}
  .sp-prev .sp-val{color:var(--amber);text-shadow:0 0 18px rgba(255,179,71,.3);}
  .sp-total .sp-label{color:var(--pink)!important;}
  .sp-total .sp-val{color:var(--pink)!important;font-size:3rem;text-shadow:0 0 22px rgba(255,110,180,.4)!important;}

  .section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:44px 0 0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:700px){
    .status-grid{grid-template-columns:1fr;}
    .clients-grid{grid-template-columns:repeat(2,1fr);}
    .compare-row{grid-template-columns:1fr;}
    .sponsor-body{grid-template-columns:repeat(2,1fr);}
    .header{padding:14px 18px;}
    .container{padding:24px 14px 40px;}
    .status-num,.cc-val{font-size:3rem;}
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">🎬</div>
    <div class="brand-text">
      <h1>لوحة إحصائيات الإنتاج</h1>
      <p>Production Dashboard · Real-time Stats</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="dot"></span>
    <span id="updateTime">جارٍ التحميل...</span><br/>
    <span style="font-size:.65rem;">البيانات من Google Sheets</span>
  </div>
</header>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>جارٍ تحميل البيانات من Google Sheets...</p>
  </div>
</div>

<script>
google.charts.load('current');
google.charts.setOnLoadCallback(loadData);

const sheetID = "17I1gZX_N0_0QdswT6Hc13LJRezyz23J6v4aLjIeru8Q";

// Store all values
const DATA = {};
let totalCalls = 0;
let doneCalls  = 0;

function getValue(sheet, range, key) {
  totalCalls++;
  const q = new google.visualization.Query(
    `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&range=${range}`
  );
  q.send(function(res) {
    try {
      const table = res.getDataTable();
      const v = table ? table.getValue(0, 0) : null;
      DATA[key] = (v === null || v === undefined || v === '') ? '—' : v;
    } catch(e) {
      DATA[key] = '—';
    }
    doneCalls++;
    if (doneCalls >= totalCalls) renderUI();
  });
}

function loadData() {
  // Sheet1 – Status
  getValue("Sheet1","I2",  "notEdit");
  getValue("Sheet1","J2",  "notApprove");
  getValue("Sheet1","K2",  "notPublished");
  // Sheet1 – Client labels (row 5)
  getValue("Sheet1","I5",  "rymax_lbl");
  getValue("Sheet1","J5",  "mawaran_lbl");
  getValue("Sheet1","K5",  "rc_lbl");
  getValue("Sheet1","L5",  "client_lbl");
  // Sheet1 – Client values (row 6)
  getValue("Sheet1","I6",  "rymax_val");
  getValue("Sheet1","J6",  "mawaran_val");
  getValue("Sheet1","K6",  "rc_val");
  getValue("Sheet1","L6",  "client_val");
  // Sheet1 – Edited videos
  getValue("Sheet1","I8",  "vid_this");
  getValue("Sheet1","K8",  "vid_prev");
  // Sheet1 – Danyar
  getValue("Sheet1","I11", "dan_this");
  getValue("Sheet1","K11", "dan_prev");
  // Sheet1 – Photo
  getValue("Sheet1","I14", "photo_this");
  getValue("Sheet1","K14", "photo_prev");
  // Sponsore – This month
  getValue("Sponsore","H4","s_rymax");
  getValue("Sponsore","I4","s_mawaran");
  getValue("Sponsore","J4","s_rc");
  getValue("Sponsore","K4","s_client");
  getValue("Sponsore","L4","s_total");
  // Sponsore – Previous month
  getValue("Sponsore","H8","p_rymax");
  getValue("Sponsore","I8","p_mawaran");
  getValue("Sponsore","J8","p_rc");
  getValue("Sponsore","K8","p_client");
  getValue("Sponsore","L8","p_total");
}

function d(key) {
  return DATA[key] !== undefined ? DATA[key] : '—';
}

function renderUI() {
  const now = new Date().toLocaleString('ar-IQ',{
    weekday:'short',year:'numeric',month:'short',day:'numeric',
    hour:'2-digit',minute:'2-digit'
  });
  document.getElementById('updateTime').textContent = now;

  document.getElementById('app').innerHTML = `

    <div class="sec-header">
      <div class="sec-icon purple">🎬</div>
      <h2 class="purple">Video Editing</h2>
      <div class="sec-line"></div>
    </div>

    <div class="compare-group">
      <div class="compare-label">Edited Videos</div>
      <div class="compare-row">
        <div class="compare-card this-m">
          <div class="compare-card-head">📅 Edited this month</div>
          <div class="compare-card-body"><div class="cc-val">${d('vid_this')}</div></div>
        </div>
        <div class="compare-card prev-m">
          <div class="compare-card-head">🗓️ Edited Previous month</div>
          <div class="compare-card-body"><div class="cc-val">${d('vid_prev')}</div></div>
        </div>
      </div>
    </div>

    <div class="compare-group" style="margin-top:18px;">
      <div class="compare-label">By Danyar</div>
      <div class="compare-row">
        <div class="compare-card this-m">
          <div class="compare-card-head">📅 this month By Danyar</div>
          <div class="compare-card-body"><div class="cc-val">${d('dan_this')}</div></div>
        </div>
        <div class="compare-card prev-m">
          <div class="compare-card-head">🗓️ Previous month By Danyar</div>
          <div class="compare-card-body"><div class="cc-val">${d('dan_prev')}</div></div>
        </div>
      </div>
    </div>

    <div class="compare-group" style="margin-top:18px;">
      <div class="compare-label">Photo</div>
      <div class="compare-row">
        <div class="compare-card this-m">
          <div class="compare-card-head">📅 Photo this month</div>
          <div class="compare-card-body"><div class="cc-val">${d('photo_this')}</div></div>
        </div>
        <div class="compare-card prev-m">
          <div class="compare-card-head">🗓️ Photo Previous month</div>
          <div class="compare-card-body"><div class="cc-val">${d('photo_prev')}</div></div>
        </div>
      </div>
    </div>

    <div class="section-divider"></div>

    <div class="sec-header">
      <div class="sec-icon green">📢</div>
      <h2 class="green">Sponsore Ads</h2>
      <div class="sec-line"></div>
    </div>

    <div class="sponsor-block sp-this">
      <div class="sponsor-head">📅 This Month</div>
      <div class="sponsor-body">
        <div class="sp-item"><div class="sp-label">Rymax</div>  <div class="sp-val">${d('s_rymax')}</div></div>
        <div class="sp-item"><div class="sp-label">Mawaran</div><div class="sp-val">${d('s_mawaran')}</div></div>
        <div class="sp-item"><div class="sp-label">RC</div>      <div class="sp-val">${d('s_rc')}</div></div>
        <div class="sp-item"><div class="sp-label">Client</div>  <div class="sp-val">${d('s_client')}</div></div>
        <div class="sp-item sp-total"><div class="sp-label">Total</div><div class="sp-val">${d('s_total')}</div></div>
      </div>
    </div>

    <div class="sponsor-block sp-prev" style="margin-top:16px;">
      <div class="sponsor-head">🗓️ Previous Month</div>
      <div class="sponsor-body">
        <div class="sp-item"><div class="sp-label">Rymax</div>  <div class="sp-val">${d('p_rymax')}</div></div>
        <div class="sp-item"><div class="sp-label">Mawaran</div><div class="sp-val">${d('p_mawaran')}</div></div>
        <div class="sp-item"><div class="sp-label">RC</div>      <div class="sp-val">${d('p_rc')}</div></div>
        <div class="sp-item"><div class="sp-label">Client</div>  <div class="sp-val">${d('p_client')}</div></div>
        <div class="sp-item sp-total"><div class="sp-label">Total</div><div class="sp-val">${d('p_total')}</div></div>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
