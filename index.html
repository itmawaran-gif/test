<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سیستەمی وەرگرتنی ئۆتۆمبێل</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; padding: 20px; color: #333; }
        .card { background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { color: #007bff; margin-bottom: 20px; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin: 15px 0; width: 100%; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        input { padding: 15px; width: 90%; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-top: 15px; background: #000; }
        .status { color: #28a745; font-weight: bold; margin-top: 15px; min-height: 24px; }
        .driver-info { background: #e7f3ff; padding: 10px; border-radius: 10px; margin-bottom: 20px; font-weight: bold; }
        #traccarOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        #traccarOverlay.show { display: flex; }
        #traccarPopup {
            background: white;
            border-radius: 20px;
            padding: 35px 25px;
            max-width: 340px;
            width: 90%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: center;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }
        #traccarPopup h3 { color: #007bff; font-size: 22px; margin-bottom: 10px; }
        #traccarPopup p { color: #555; font-size: 15px; margin-bottom: 25px; line-height: 1.6; }
        #openTraccarBtn {
            background: linear-gradient(135deg, #007bff, #0056cc);
            color: white; border: none; padding: 16px 30px;
            border-radius: 12px; font-size: 18px; font-weight: bold;
            cursor: pointer; width: 100%; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,123,255,0.4);
        }
        #openTraccarBtn:active { transform: scale(0.97); }
    </style>
</head>
<body>

<div id="traccarOverlay" class="show">
    <div id="traccarPopup">
        <h3>بەیانی باش</h3>
        <p><br><strong>ئامادەی بۆ ڕۆژێکی نوێ؟</strong><br></p>
        <button id="openTraccarBtn" onclick="openTraccar()">OK</button>
    </div>
</div>

<div class="card" id="app">
    <h2>سیستەمی وەرگرتنی ئۆتۆمبێل</h2>
    <div id="nameSection" style="display:none;">
        <p>بەخێربێن، تکایە ناوی خۆت بنووسە:</p>
        <input type="text" id="driverNameInput" placeholder="ناوی تەواوی شۆفێر">
        <button onclick="saveName()">OK</button>
    </div>
    <div id="mainSection" style="display:none;">
        <div class="driver-info" id="driverDisplayName"></div>
        <div id="reader" style="display:none;"></div>
        <button id="actionBtn" onclick="startScan()">وەرگرتنی ئۆتۆمبێل (Scan QR)</button>
        <p class="status" id="statusMsg"></p>
        <button onclick="clearUser()" style="background:none; color:#888; font-size:14px; margin-top:20px;">تغيير السائق</button>
    </div>
</div>

<script>
    let driverName = localStorage.getItem('driverName');
    let isOnTrip = localStorage.getItem('isOnTrip') === 'true';
    const scriptURL = 'https://script.google.com/macros/s/AKfycbx89l4TEtUKO27rxIoeMqxa7Sv6phCPNzsZaCh-XEMxcaW2BKqGDF6Ig8o-spsvNP8m/exec';

    function checkTraccarPopup() {
        const today = new Date().toDateString();
        const lastShown = localStorage.getItem('traccarLastShown');
        if (lastShown === today) {
            document.getElementById('traccarOverlay').classList.remove('show');
        }
    }

    function openTraccar() {
        const today = new Date().toDateString();
        localStorage.setItem('traccarLastShown', today);
        document.getElementById('traccarOverlay').classList.remove('show');

        // Use hidden iframe so the browser stays on this page
        const iframe = document.createElement('iframe');
        iframe.style.display = 'none';
        iframe.src = 'org.traccar.client://';
        document.body.appendChild(iframe);
        setTimeout(() => document.body.removeChild(iframe), 2000);
    }

    window.onload = () => {
        checkTraccarPopup();
        if (!driverName) {
            document.getElementById('nameSection').style.display = 'block';
        } else {
            showMain();
        }
    };

    function saveName() {
        let name = document.getElementById('driverNameInput').value.trim();
        if (name) {
            localStorage.setItem('driverName', name);
            driverName = name;
            showMain();
        } else {
            alert("تکایە ناوەکە بنووسن");
        }
    }

    function showMain() {
        document.getElementById('nameSection').style.display = 'none';
        document.getElementById('mainSection').style.display = 'block';
        document.getElementById('driverDisplayName').innerText = "السائق: " + driverName;
        updateUI();
    }

    function updateUI() {
        const btn = document.getElementById('actionBtn');
        if (isOnTrip) {
            btn.innerText = "گەڕاندنەوەی ئۆتۆمبێل (Scan QR)";
            btn.style.background = "#dc3545";
        } else {
            btn.innerText = "وەرگرتنی ئۆتۆمبێل (Scan QR)";
            btn.style.background = "#007bff";
        }
    }

    function startScan() {
        document.getElementById('reader').style.display = 'block';
        document.getElementById('statusMsg').innerText = "جاري فتح الكاميرا...";
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        html5QrCode.start({ facingMode: "environment" }, config,
            (decodedText) => {
                sendData(decodedText);
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                });
            }
        ).catch(err => {
            alert("خطأ في الكاميرا: تأكد من إعطاء الصلاحية");
            document.getElementById('reader').style.display = 'none';
        });
    }

    function sendData(carId) {
        const type = isOnTrip ? "end" : "start";
        const now = new Date().toLocaleString('en-GB', {
            year: 'numeric', month: 'numeric', day: 'numeric',
            hour: '2-digit', minute: '2-digit', second: '2-digit',
            hour12: false
        }).replace(/\//g, '-');
        document.getElementById('statusMsg').innerText = "داتاکان تۆمار دەکرێن...";
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ driverName, carId, time: now, type })
        }).then(() => {
            isOnTrip = !isOnTrip;
            localStorage.setItem('isOnTrip', isOnTrip);
            document.getElementById('statusMsg').innerText = "تەواو ✅";
            updateUI();
        }).catch(err => {
            alert("فشل الاتصال: " + err);
            document.getElementById('statusMsg').innerText = "هەڵەی گواستنەوە ❌";
        });
    }

    function clearUser() {
        let password = prompt("تکایە وشەی نهێنی بنووسە (أدخل كلمة السر):");
        if (password === "Mm19941994Mm") {
            if(confirm("آیا دڵنیایت لە سڕینەوەی ناوی شۆفێر؟ (هل تريد مسح بيانات السائق؟)")) {
                localStorage.clear();
                location.reload();
            }
        } else if (password !== null) {
            alert("وشەی نهێنی هەڵەیە! (كلمة السر خاطئة)");
        }
    }

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        });
    }
</script>
</body>
</html>
