<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketing Department Statistics</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:     #07090f;
    --bg2:    #0c1020;
    --bg3:    #111827;
    --border: rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.12);
    --red:    #ff4d6d;
    --amber:  #ffb347;
    --cyan:   #00e5ff;
    --purple: #b06eff;
    --green:  #00e676;
    --pink:   #ff6eb4;
    --blue:   #4fc3f7;
    --teal:   #26ffb8;
    --orange: #ff8c42;
    --text:   #e8eaf0;
    --muted:  #6b7280;
    --dim:    #374151;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }

  /* HEADER */
  .header{
    position:relative;z-index:10;
    background:linear-gradient(180deg,rgba(10,12,24,0.98),rgba(10,12,24,0.85));
    border-bottom:1px solid var(--border2);padding:18px 36px;
    display:flex;align-items:center;justify-content:space-between;
    backdrop-filter:blur(20px);
  }
  .header-brand{display:flex;align-items:center;gap:14px;}
  .brand-icon{
    width:44px;height:44px;
    background:linear-gradient(135deg,var(--purple),var(--cyan));
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;flex-shrink:0;
  }
  .brand-text h1{
    font-size:1.15rem;font-weight:900;letter-spacing:.02em;
    background:linear-gradient(90deg,#c084fc,#67e8f9);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;
  }
  .brand-text p{font-size:.7rem;color:var(--muted);font-weight:500;letter-spacing:.04em;}
  .header-meta{text-align:left;font-size:.72rem;color:var(--muted);line-height:1.7;}
  .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--green);margin-left:6px;animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

  /* CONTAINER */
  .container{
    position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:36px 24px 60px;
  }

  /* SECTION HEADER */
  .sec-header{display:flex;align-items:center;gap:14px;margin:40px 0 22px;}
  .sec-icon{
    width:46px;height:46px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;
  }
  .sec-icon.purple{background:rgba(176,110,255,.15);box-shadow:0 0 20px rgba(176,110,255,.2);}
  .sec-icon.green {background:rgba(0,230,118,.12); box-shadow:0 0 20px rgba(0,230,118,.15);}
  .sec-header h2{font-size:2rem;font-weight:900;letter-spacing:.03em;}
  .sec-header h2.purple{color:#c084fc;}
  .sec-header h2.green {color:#86efac;}
  .sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

  /* LOADING */
  .loading{text-align:center;padding:80px 20px;color:var(--muted);}
  .spinner{
    width:48px;height:48px;border:3px solid var(--dim);border-top-color:var(--purple);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading p{font-size:.95rem;}

  /* STATUS CARDS */
  .status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
  .status-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:18px;
    padding:28px 24px;text-align:center;position:relative;overflow:hidden;
    animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .status-card:hover{transform:translateY(-3px);}
  .status-card::after{content:'';position:absolute;inset:0;border-radius:inherit;opacity:.06;}
  .status-card.s-red  {border-top:2px solid var(--red);}
  .status-card.s-amber{border-top:2px solid var(--amber);}
  .status-card.s-cyan {border-top:2px solid var(--cyan);}
  .status-card.s-red::after  {background:var(--red);}
  .status-card.s-amber::after{background:var(--amber);}
  .status-card.s-cyan::after {background:var(--cyan);}
  .status-glow{
    position:absolute;top:-20px;left:50%;transform:translateX(-50%);
    width:80px;height:80px;border-radius:50%;filter:blur(30px);opacity:.25;
  }
  .s-red   .status-glow{background:var(--red);}
  .s-amber .status-glow{background:var(--amber);}
  .s-cyan  .status-glow{background:var(--cyan);}
  .status-num{
    font-family:'Bebas Neue','Cairo',sans-serif;
    font-size:4.5rem;line-height:1;letter-spacing:.04em;margin-bottom:8px;position:relative;
  }
  .s-red   .status-num{color:var(--red);  text-shadow:0 0 30px rgba(255,77,109,.4);}
  .s-amber .status-num{color:var(--amber);text-shadow:0 0 30px rgba(255,179,71,.4);}
  .s-cyan  .status-num{color:var(--cyan); text-shadow:0 0 30px rgba(0,229,255,.4);}
  .status-label{font-size:.82rem;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}

  /* CLIENT CARDS */
  .clients-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:16px;}
  .client-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:16px;
    padding:20px 16px;text-align:center;animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .client-card:hover{transform:translateY(-2px);}
  .client-name{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}
  .client-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:3rem;line-height:1;letter-spacing:.05em;}
  .cv-purple{color:var(--purple);text-shadow:0 0 20px rgba(176,110,255,.35);}
  .cv-blue  {color:var(--blue);  text-shadow:0 0 20px rgba(79,195,247,.35);}
  .cv-teal  {color:var(--teal);  text-shadow:0 0 20px rgba(38,255,184,.35);}
  .cv-orange{color:var(--orange);text-shadow:0 0 20px rgba(255,140,66,.35);}

  /* COMPARE */
  .compare-group{margin-top:24px;}
  .compare-label{
    font-size:1.1rem;font-weight:800;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .compare-label::before{content:'';width:16px;height:2px;background:var(--purple);border-radius:2px;display:inline-block;}
  .compare-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .compare-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .compare-card:hover{transform:translateY(-2px);}
  .compare-card-head{
    padding:14px 22px;font-size:1.1rem;font-weight:700;letter-spacing:.04em;
    display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);
  }
  .compare-card.this-m .compare-card-head{background:rgba(176,110,255,.10);color:#c084fc;}
  .compare-card.prev-m .compare-card-head{background:rgba(79,195,247,.08); color:var(--blue);}
  .compare-card-body{display:flex;align-items:center;justify-content:center;padding:24px;}
  .cc-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:4.2rem;line-height:1;letter-spacing:.04em;}
  .this-m .cc-val{color:var(--purple);text-shadow:0 0 22px rgba(176,110,255,.4);}
  .prev-m .cc-val{color:var(--blue);  text-shadow:0 0 22px rgba(79,195,247,.3);}

  /* SPONSOR */
  .sponsor-block{
    background:var(--bg3);border:1px solid var(--border);
    border-radius:18px;overflow:hidden;animation:fadeUp .5s ease both;
  }
  .sponsor-head{
    padding:16px 24px;font-size:1.15rem;font-weight:800;letter-spacing:.04em;
    display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);
  }
  .sponsor-block.sp-this .sponsor-head{background:rgba(0,230,118,.08);color:var(--green);}
  .sponsor-block.sp-prev .sponsor-head{background:rgba(255,179,71,.08); color:var(--amber);}
  .sponsor-body{display:grid;grid-template-columns:repeat(5,1fr);padding:22px 24px;gap:8px;}
  .sp-item{text-align:center;padding:8px 4px;}
  .sp-label{font-size:.9rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .sp-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:2.8rem;line-height:1;letter-spacing:.04em;}
  .sp-this .sp-val{color:var(--green);text-shadow:0 0 18px rgba(0,230,118,.3);}
  .sp-prev .sp-val{color:var(--amber);text-shadow:0 0 18px rgba(255,179,71,.3);}
  .sp-total .sp-label{color:var(--pink)!important;}
  .sp-total .sp-val{color:var(--pink)!important;font-size:3rem;text-shadow:0 0 22px rgba(255,110,180,.4)!important;}

  .section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:44px 0 0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

  /* ===== NEW: JOB SECTION ===== */
  .job-wrap{
    margin-top:24px;
  }
  .job-controls{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
    flex-wrap:wrap;
    margin:0 0 14px;
  }
  .job-controls .job-title{
    font-size:1.1rem;font-weight:900;color:var(--muted);
    letter-spacing:.06em;text-transform:uppercase;
    display:flex;align-items:center;gap:10px;
  }
  .job-controls .job-title::before{
    content:'';
    width:16px;height:2px;background:var(--cyan);
    border-radius:2px;display:inline-block;
  }
  .job-controls .job-date{
    display:flex;align-items:center;gap:10px;
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    padding:10px 12px;border-radius:14px;
  }
  .job-controls label{color:var(--muted);font-weight:700;font-size:.95rem;}
  .job-controls input[type="date"]{
    background:transparent;color:var(--text);
    border:1px solid var(--border2);
    border-radius:10px;padding:8px 10px;
    outline:none;
  }
  .job-controls .job-refresh{
    background:linear-gradient(135deg,rgba(176,110,255,.22),rgba(0,229,255,.18));
    border:1px solid rgba(255,255,255,0.10);
    color:var(--text);
    padding:8px 12px;border-radius:12px;
    cursor:pointer;font-weight:800;letter-spacing:.02em;
    transition:transform .2s, filter .2s;
  }
  .job-controls .job-refresh:hover{transform:translateY(-1px);filter:brightness(1.05);}

  .job-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:14px;
  }
  .job-card{
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:18px;
    overflow:hidden;
    animation:fadeUp .5s ease both;
  }
  .job-card .job-head{
    padding:14px 18px;
    display:flex;align-items:center;justify-content:flex-start;gap:10px;
    border-bottom:1px solid var(--border);
    background:rgba(0,229,255,.06);
    font-weight:900;
    letter-spacing:.04em;
  }
  .job-card .job-head .job-person{
    font-size:1.1rem;
  }
  .job-card .job-table{
    display:grid;
    grid-template-columns:1fr 1.4fr;
  }
  /* column widths: left is dates(header) and right is works */
  .job-col{
    padding:14px 16px;
  }
  .job-col.left{
    border-left:1px solid var(--border);
    background:rgba(255,255,255,0.02);
  }
  .job-col.right{
    padding-right:18px;
  }
  .job-hdr{
    font-size:.9rem;color:var(--muted);font-weight:800;letter-spacing:.05em;text-transform:uppercase;
    margin-bottom:10px;
  }
  .job-date-val{
    font-family:'Bebas Neue','Cairo',sans-serif;
    font-size:1.45rem;line-height:1.1;letter-spacing:.02em;
    color:#cfefff;
    text-shadow:0 0 14px rgba(0,229,255,.18);
    margin-bottom:10px;
    word-break:break-word;
  }
  .job-works{
    display:flex;flex-direction:column;gap:8px;
    word-break:break-word;
  }
  .job-work-item{
    background:rgba(255,255,255,0.03);
    border:1px solid var(--border);
    border-radius:12px;
    padding:10px 12px;
    display:flex;align-items:flex-start;justify-content:space-between;gap:10px;
  }
  .job-work-item .job-work-text{
    font-weight:700; color:var(--text);
    font-size:.98rem;
    line-height:1.5;
  }
  .job-empty{
    padding:18px 16px;
    color:var(--muted);
    font-weight:700;
  }

  @media(max-width:700px){
    .status-grid{grid-template-columns:1fr;}
    .clients-grid{grid-template-columns:repeat(2,1fr);}
    .compare-row{grid-template-columns:1fr;}
    .sponsor-body{grid-template-columns:repeat(2,1fr);}
    .header{padding:14px 18px;}
    .container{padding:24px 14px 40px;}
    .status-num,.cc-val{font-size:3rem;}
    .job-card .job-table{grid-template-columns:1fr;}
    .job-col.left{border-left:none;border-bottom:1px solid var(--border);}
  }
</style>
</head>
<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">🎬</div>
    <div class="brand-text">
      <h1>Marketing Department Statistics</h1>
      <p>Production Dashboard · Real-time Stats</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="dot"></span>
    <span id="updateTime">Loading...</span><br/>
  </div>
</header>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>

<script>
google.charts.load('current');
google.charts.setOnLoadCallback(loadData);

const sheetID = "17I1gZX_N0_0QdswT6Hc13LJRezyz23J6v4aLjIeru8Q";

// Store all values
const DATA = {};
let totalCalls = 0;
let doneCalls  = 0;

function getValue(sheet, range, key) {
  totalCalls++;
  const q = new google.visualization.Query(
    `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&range=${range}`
  );
  q.send(function(res) {
    try {
      const table = res.getDataTable();
      const v = table ? table.getValue(0, 0) : null;
      DATA[key] = (v === null || v === undefined || v === '') ? '—' : v;
    } catch(e) {
      DATA[key] = '—';
    }
    doneCalls++;
    if (doneCalls >= totalCalls) renderUI();
  });
}

/* ===== NEW: JOB BULK FETCH =====
   الافتراضات عن صفحة "job" (عدّل إذا كانت مختلفة):
   - الصف 1: أسماء الموظفين (بدءاً من العمود B مثلاً)، مع كل موظف يأخذ عمودين متجاورين:
       [EmployeeNameHeader1][DateHeader1] [WorksHeader1]
     لكن حسب وصفك: "يوجد اسماء الموضف في السطر الاول كل عمودين مدموجين و فيهم اسم و تحتهم الهيدر الخاص بالتاريخ على اليسار و الاعمال على اليمين"
   - الصف 2: تحت اسم الموظف يوجد هيدر التاريخ في العمود الأول (Date column) وهيدر الأعمال في العمود الثاني (Works column)
   - الصفوف بدءاً من 3: يوجد تاريخ في عمود التاريخ، وأعمال الموظف في عمود الأعمال
*/
const JOB_SHEET = "job";
// لتكن الأداة تعرف نطاق الأعمدة تلقائياً سنطلب "الحد الأقصى" بشكل واسع (عدّل إذا احتجت)
const JOB_RANGE = "A1:Z200";

let JOB_MATRIX = {
  headers: [], // [{ name, dateCol, worksCol }]
  rows: []     // [{ date: 'YYYY-MM-DD' , worksByPersonName: {Name: worksStringOrHtml}}]
};

// تحويل التاريخ إلى صيغة date input (YYYY-MM-DD)
function toISODate(d){
  // d: Date
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}
function normalizeAnyDateToISO(value){
  if(value === null || value === undefined || value === '') return '';
  // إذا كان Excel/Sheets يرجع date كـ "Date" أو كنص
  try{
    // لو كان كـ Date object:
    if(Object.prototype.toString.call(value) === '[object Date]'){
      return toISODate(value);
    }
  }catch(e){}
  // لو نص مثل 14/04/2026 أو 2026-04-14
  const s = String(value).trim();
  // ISO مباشرة
  if(/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;

  // dd/mm/yyyy
  const m1 = s.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
  if(m1){
    const dd = String(m1[1]).padStart(2,'0');
    const mm = String(m1[2]).padStart(2,'0');
    const yyyy = m1[3];
    return `${yyyy}-${mm}-${dd}`;
  }

  // yyyy/mm/dd
  const m2 = s.match(/^(\d{4})[\/\-\.](\d{1,2})[\/\-\.](\d{1,2})$/);
  if(m2){
    const yyyy = m2[1];
    const mm = String(m2[2]).padStart(2,'0');
    const dd = String(m2[3]).padStart(2,'0');
    return `${yyyy}-${mm}-${dd}`;
  }

  return s; // fallback
}

function fetchJobMatrix(){
  totalCalls++;
  const q = new google.visualization.Query(
    `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(JOB_SHEET)}&range=${encodeURIComponent(JOB_RANGE)}`
  );
  q.send(function(res){
    try{
      const table = res.getDataTable();
      // table.getNumberOfRows(), getNumberOfColumns()
      const colCount = table ? table.getNumberOfColumns() : 0;
      const rowCount = table ? table.getNumberOfRows() : 0;

      // نفترض صف 1 = index 0، صف 2 = index 1، بيانات تبدأ من index 2
      // واسم الموظف موجود في صف 1 عند بداية كل زوج أعمدة.
      // لكن لا نستطيع معرفة أين يبدأ بالضبط، لذا سنفحص الأعمدة:
      // - الأعمدة الزوجية/المزدوجة: (dateCol, worksCol) للأسماء.
      // سنبني رؤوس عبر دمجها منطقيًا: نأخذ عنوان الاسم من الصف 1 عند عمود "dateCol" (نفترض).
      const headers = [];
      // هنا سنحاول كشف الأزواج: نفترض أن العمود A هو التاريخ العام أو يكون ضمن الأزواج.
      // حسب وصفك: "الهيدر الخاص بالتاريخ على اليسار و الاعمال على اليمين" داخل كل زوج.
      // يعني: لكل موظف يوجد عمود تاريخ وعمود أعمال ضمن الزوج نفسه.
      // لذلك سنعامل كل زوج أعمدة (k,k+1) كموظف واحد.
      // سنبدأ من عمود 1 (B) لأن A غالباً للتاريخ العام، ولكن قد لا يكون موجوداً.
      // سنجرب من العمود 0 إلى النهاية بأزواج.
      // الأفضل: إذا كانت الأعمدة تبدأ من A، سنعمل الأزواج من A.
      // سنستخدم: الاسم من الصف 1 عند الأعمدة الفردية/زوجية ونسمح فارغ.

      for(let c=0;c<colCount;c+=2){
        const nameCell = table.getValue(0, c);
        const name = (nameCell === null || nameCell === undefined || String(nameCell).trim()==='') ? '' : String(nameCell).trim();
        if(!name) continue;
        headers.push({
          name,
          dateCol: c,
          worksCol: c+1
        });
      }

      JOB_MATRIX.headers = headers;
      JOB_MATRIX.rows = [];

      for(let r=2;r<rowCount;r++){
        // لكل صف بيانات: نقرأ التاريخ من كل موظف (تاريخ كل موظف داخل زوجه)
        // ونكوّن سجل لكل تاريخ إذا كانت الأعمال موجودة.
        // بما أنك تريد: "يجب يجلب البيانات ... لليوم السابق عند الفتح"
        // سنفترض أن التاريخ في "dateCol" لكل موظف يمثل اليوم لنفس الصف.
        const byPerson = {};
        let anyWork = false;

        // نأخذ التاريخ كـ أول تاريخ غير فارغ من أي موظف
        let rowDateISO = '';

        for(const h of headers){
          const rawDate = table.getValue(r, h.dateCol);
          const dateISO = normalizeAnyDateToISO(rawDate);
          const worksRaw = table.getValue(r, h.worksCol);
          const works = (worksRaw === null || worksRaw === undefined || String(worksRaw).trim()==='') ? '' : String(worksRaw).trim();

          if(dateISO && !rowDateISO) rowDateISO = dateISO;
          if(works){
            anyWork = true;
            byPerson[h.name] = works;
          }
        }
        if(!rowDateISO) continue;
        if(!anyWork) continue;

        // قد تتكرر نفس السنة/الشهر/اليوم عبر موظفين مختلفين في صفوف مختلفة.
        // سنجمع: لكل تاريخ نخزن الأعمال لكل موظف.
        let existing = JOB_MATRIX.rows.find(x => x.dateISO === rowDateISO);
        if(!existing){
          existing = { dateISO: rowDateISO, worksByPersonName: {} };
          JOB_MATRIX.rows.push(existing);
        }
        Object.assign(existing.worksByPersonName, byPerson);
      }
    }catch(e){
      JOB_MATRIX.headers = [];
      JOB_MATRIX.rows = [];
    }

    doneCalls++;
    if (doneCalls >= totalCalls) renderUI();
  });
}

function loadData() {
  // Sheet1 – Status
  getValue("Sheet1","I2",  "notEdit");
  getValue("Sheet1","J2",  "notApprove");
  getValue("Sheet1","K2",  "notPublished");
  // Sheet1 – Client labels (row 5)
  getValue("Sheet1","I5",  "rymax_lbl");
  getValue("Sheet1","J5",  "mawaran_lbl");
  getValue("Sheet1","K5",  "rc_lbl");
  getValue("Sheet1","L5",  "client_lbl");
  // Sheet1 – Client values (row 6)
  getValue("Sheet1","I6",  "rymax_val");
  getValue("Sheet1","J6",  "mawaran_val");
  getValue("Sheet1","K6",  "rc_val");
  getValue("Sheet1","L6",  "client_val");
  // Sheet1 – Edited videos
  getValue("Sheet1","I8",  "vid_this");
  getValue("Sheet1","K8",  "vid_prev");
  // Sheet1 – Danyar
  getValue("Sheet1","I11", "dan_this");
  getValue("Sheet1","K11", "dan_prev");
  // Sheet1 – Photo
  getValue("Sheet1","I14", "photo_this");
  getValue("Sheet1","K14", "photo_prev");
  // Sponsore – This month
  getValue("Sponsore","H4","s_rymax");
  getValue("Sponsore","I4","s_mawaran");
  getValue("Sponsore","J4","s_rc");
  getValue("Sponsore","K4","s_client");
  getValue("Sponsore","L4","s_total");
  // Sponsore – Previous month
  getValue("Sponsore","H8","p_rymax");
  getValue("Sponsore","I8","p_mawaran");
  getValue("Sponsore","J8","p_rc");
  getValue("Sponsore","K8","p_client");
  getValue("Sponsore","L8","p_total");

  // ===== NEW: fetch job matrix =====
  fetchJobMatrix();
}

function d(key) {
  return DATA[key] !== undefined ? DATA[key] : '—';
}

let JOB_SELECTED_DATE_ISO = "";

function getYesterdayISO(){
  const d = new Date();
  d.setDate(d.getDate()-1);
  // adjust to local: keep date component only
  return toISODate(d);
}

function renderJobSection(){
  const selected = JOB_SELECTED_DATE_ISO || getYesterdayISO();

  // تحديث قيمة input
  const input = document.getElementById('jobDateInput');
  if(input) input.value = selected;

  const row = JOB_MATRIX.rows.find(x => x.dateISO === selected);

  // إذا لا يوجد بيانات، نعرض صفحة فاضية
  const worksByPerson = row ? row.worksByPersonName : {};

  const cardsHtml = JOB_MATRIX.headers.map((h, idx)=>{
    const works = worksByPerson[h.name];
    const worksText = works && String(works).trim() ? works : '—';

    // لعرض الأعمال كمفصل/قائمة لو كانت مفصولة بفواصل أو أسطر
    // نقسم على سطر جديد أو فاصلة
    const parts = String(worksText).split(/\r?\n/).map(s=>s.trim()).filter(Boolean);
    const displayParts = (parts.length <= 1 && worksText!=='—')
      ? String(worksText).split(/\s*،\s*|,\s*/).map(s=>s.trim()).filter(Boolean)
      : parts;

    const items = (worksText === '—')
      ? `<div class="job-empty">لا توجد أعمال في هذا اليوم.</div>`
      : `<div class="job-works">
           ${displayParts.length ? displayParts.map(p=>`
              <div class="job-work-item">
                <div class="job-work-text">${p}</div>
              </div>
           `).join('') : `<div class="job-empty">لا توجد أعمال في هذا اليوم.</div>`}
         </div>`;

    return `
      <div class="job-card">
        <div class="job-head">👤 <span class="job-person">${h.name}</span></div>
        <div class="job-table">
          <div class="job-col left">
            <div class="job-hdr">Date</div>
            <div class="job-date-val">${selected}</div>
          </div>
          <div class="job-col right">
            <div class="job-hdr">Works</div>
            ${items}
          </div>
        </div>
      </div>
    `;
  }).join('');

  if(!JOB_MATRIX.headers.length){
    return `<div class="job-wrap">
      <div class="job-card"><div class="job-head">📌 <span class="job-person">job</span></div>
      <div class="job-empty">تعذر تحميل بيانات صفحة "job". تأكد من نطاق الأعمدة/الرؤوس أو شكل الجدول.</div></div>
    </div>`;
  }

  return `
    <div class="job-wrap">
      <div class="job-controls">
        <div class="job-title">Job · أعمال الموظفين</div>
        <div class="job-date">
          <label for="jobDateInput">التاريخ:</label>
          <input id="jobDateInput" type="date"/>
          <button class="job-refresh" id="jobApplyBtn" type="button">عرض</button>
        </div>
      </div>

      <div class="job-grid" id="jobGrid">
        ${cardsHtml}
      </div>
    </div>
  `;
}

        <div class="sp-item"><div class="sp-label">Client</div>  <div class="sp-val">${d('s_client')}</div></div>
        <div class="sp-item sp-total"><div class="sp-label">Total</div><div class="sp-val">${d('s_total')}</div></div>
      </div>
    </div>

    <div class="sponsor-block sp-prev" style="margin-top:16px;">
      <div class="sponsor-head">🗓️ Previous Month</div>
      <div class="sponsor-body">
        <div class="sp-item"><div class="sp-label">Rymax</div>  <div class="sp-val">${d('p_rymax')}</div></div>
        <div class="sp-item"><div class="sp-label">Mawaran</div><div class="sp-val">${d('p_mawaran')}</div></div>
        <div class="sp-item"><div class="sp-label">RC</div>      <div class="sp-val">${d('p_rc')}</div></div>
        <div class="sp-item"><div class="sp-label">Client</div>  <div class="sp-val">${d('p_client')}</div></div>
        <div class="sp-item sp-total"><div class="sp-label">Total</div><div class="sp-val">${d('p_total')}</div></div>
      </div>
    </div>

    <!-- ===== NEW: JOB SECTION at bottom ===== -->
    <div class="section-divider"></div>

      JOB_SELECTED_DATE_ISO = getYesterdayISO();
      return renderJobSection();

  // bind job events
  const applyBtn = document.getElementById('jobApplyBtn');
  const input = document.getElementById('jobDateInput');

  if(applyBtn && input){
    const apply = () => {
      JOB_SELECTED_DATE_ISO = input.value || getYesterdayISO();
      // إعادة عرض القسم فقط
      const jobHtml = renderJobSection();
      // نحتاج نبدل الجزء كله (ببساطة عبر إعادة innerHTML داخل container jobGrid parent)
      // سنستبدل كل job-wrap:
      const existing = document.querySelector('.job-wrap');
      if(existing){
        existing.outerHTML = jobHtml;
      }
      // إعادة binding بعد الاستبدال
      const newApply = document.getElementById('jobApplyBtn');
      const newInput = document.getElementById('jobDateInput');
      if(newApply && newInput){
        newApply.onclick = apply;
        newInput.onchange = null;
      }
    };

    applyBtn.onclick = apply;
    input.onchange = apply; // يعرض مباشرة عند اختيار التاريخ (اختياري)
  }

</script>
