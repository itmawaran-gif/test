<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>سیستەمی وەرگرتنی ئۆتۆمبێل</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#007bff">
<meta name="apple-mobile-web-app-capable" content="yes">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:'Segoe UI',Tahoma;
    background:#f0f2f5;
    padding:20px;
    text-align:center;
    color:#333;
}

.card{
    background:white;
    max-width:420px;
    margin:auto;
    padding:30px 20px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
    color:#007bff;
    margin-bottom:20px;
}

button{
    border:none;
    border-radius:15px;
    cursor:pointer;
    width:100%;
    transition:0.3s;
    font-weight:bold;
}

button:active{
    transform:scale(0.98);
}

input{
    width:90%;
    padding:15px;
    border-radius:12px;
    border:2px solid #ddd;
    font-size:16px;
    outline:none;
    margin:10px 0;
}

input:focus{
    border-color:#007bff;
}

#reader{
    width:100%;
    overflow:hidden;
    border-radius:15px;
    margin-top:15px;
    background:black;
}

.status{
    margin-top:15px;
    font-weight:bold;
    color:#28a745;
    min-height:24px;
}

.driver-info{
    background:#e7f3ff;
    padding:12px;
    border-radius:12px;
    margin-bottom:20px;
    font-weight:bold;
}

#actionBtn{
    background:#dc3545;
    color:white;
    font-size:24px;
    padding:25px;
    margin-bottom:15px;
}

#newCarBtn{
    background:#28a745;
    color:white;
    font-size:16px;
    padding:14px;
    display:none;
}

#changeDriverBtn{
    background:none;
    color:#888;
    font-size:14px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="card">

<h2>سیستەمی ئۆتۆمبێل</h2>

<div id="nameSection" style="display:none;">

<p>تکایە ناوی خۆت بنووسە</p>

<input
    type="text"
    id="driverNameInput"
    placeholder="ناوی تەواوی شۆفێر">

<button
    style="background:#007bff;color:white;padding:15px;font-size:18px;"
    onclick="saveName()">

    بەردەوامبوون

</button>

</div>

<div id="mainSection" style="display:none;">

<div
    class="driver-info"
    id="driverDisplayName">
</div>

<div
    id="reader"
    style="display:none;">
</div>

<button
    id="actionBtn"
    onclick="startScan()">

    وەرگرتنی ئۆتۆمبێل

</button>

<button
    id="newCarBtn"
    onclick="startNewCarFlow()">

    وەرگرتنی ئۆتۆمبێلی تر

</button>

<p
    class="status"
    id="statusMsg">
</p>

<button
    id="changeDriverBtn"
    onclick="clearUser()">

    گۆڕینی شۆفێر

</button>

</div>

</div>

<script>

const scriptURL =
'https://script.google.com/macros/s/AKfycbwqwC_sRKH_NK8JALTOukX5nWd5VY_F1ghi9MzKvLqZVfKTeqy8jVmwqlc9iVlHGmtI/exec';

let driverName =
localStorage.getItem('driverName');

let isOnTrip = false;

let currentCarId = null;

window.onload = () => {

    if(!driverName){

        document
        .getElementById('nameSection')
        .style.display = 'block';

    }else{

        showMain();
    }
};

function saveName(){

    let name =
    document
    .getElementById('driverNameInput')
    .value
    .trim();

    if(name){

        localStorage
        .setItem('driverName',name);

        driverName = name;

        showMain();

    }else{

        alert('تکایە ناوەکە بنووسە');
    }
}

function showMain(){

    document
    .getElementById('nameSection')
    .style.display='none';

    document
    .getElementById('mainSection')
    .style.display='block';

    document
    .getElementById('driverDisplayName')
    .innerText =
    'شۆفێر: ' + driverName;

    checkOpenTrip();
}

async function checkOpenTrip(){

    document
    .getElementById('statusMsg')
    .innerText =
    'جاری پشکنینی ئۆتۆمبێل...';

    try{

        const response =
        await fetch(scriptURL,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                action:'checkOpenTrip',

                driverName:driverName
            })
        });

        const result =
        await response.json();

        if(result.success){

            isOnTrip =
            result.isOnTrip;

            currentCarId =
            result.carId || null;
        }

        updateUI();

        document
        .getElementById('statusMsg')
        .innerText='';

    }catch(err){

        console.log(err);

        document
        .getElementById('statusMsg')
        .innerText =
        'هەڵە لە پەیوەندی';
    }
}

function updateUI(){

    const btn =
    document.getElementById('actionBtn');

    const newBtn =
    document.getElementById('newCarBtn');

    if(isOnTrip){

        btn.innerText =
        'گەڕاندنەوەی ئۆتۆمبێل\n' +
        currentCarId;

        btn.style.background =
        '#dc3545';

        newBtn.style.display =
        'block';

    }else{

        btn.innerText =
        'وەرگرتنی ئۆتۆمبێل';

        btn.style.background =
        '#007bff';

        newBtn.style.display =
        'none';
    }
}

function startNewCarFlow(){

    startScan(true);
}

function startScan(isNewCar=false){

    document
    .getElementById('reader')
    .style.display='block';

    document
    .getElementById('statusMsg')
    .innerText =
    'جاری کردنەوەی کامێرا...';

    const html5QrCode =
    new Html5Qrcode("reader");

    const config = {

        fps:10,

        qrbox:{
            width:250,
            height:250
        }
    };

    html5QrCode.start(

        { facingMode:"environment" },

        config,

        (decodedText)=>{

            sendData(decodedText,isNewCar);

            html5QrCode.stop().then(()=>{

                document
                .getElementById('reader')
                .style.display='none';
            });
        }

    ).catch(err=>{

        alert('هەڵە لە کامێرا');

        document
        .getElementById('reader')
        .style.display='none';
    });
}

async function sendData(carId,isNewCar=false){

    const now =
    new Date()
    .toLocaleString('en-GB',{

        year:'numeric',
        month:'2-digit',
        day:'2-digit',

        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit',

        hour12:false

    }).replace(/\//g,'-');

    document
    .getElementById('statusMsg')
    .innerText =
    'جاری تۆمارکردنی داتا...';

    try{

        let action = 'startTrip';

        if(isOnTrip && !isNewCar){

            action = 'endTrip';
        }

        const response =
        await fetch(scriptURL,{

            method:'POST',

            headers:{
                'Content-Type':'application/json'
            },

            body:JSON.stringify({

                action:action,

                driverName:driverName,

                carId:carId,

                oldCarId:currentCarId,

                time:now
            })
        });

        const result =
        await response.json();

        if(result.success){

            if(action == 'endTrip'){

                isOnTrip = false;

                currentCarId = null;

            }else{

                isOnTrip = true;

                currentCarId = carId;
            }

            updateUI();

            document
            .getElementById('statusMsg')
            .innerText =
            result.message + ' ✅';

        }else{

            document
            .getElementById('statusMsg')
            .innerText =
            result.message;
        }

    }catch(err){

        console.log(err);

        document
        .getElementById('statusMsg')
        .innerText =
        'هەڵە لە پەیوەندی ❌';
    }
}

function clearUser(){

    let password =
    prompt('تکایە وشەی نهێنی بنووسە');

    if(password === 'Mm19941994Mm'){

        if(confirm('دڵنیایت لە سڕینەوەی زانیارییەکان؟')){

            localStorage.clear();

            location.reload();
        }

    }else if(password !== null){

        alert('وشەی نهێنی هەڵەیە');
    }
}

if('serviceWorker' in navigator){

    window.addEventListener('load',()=>{

        navigator.serviceWorker
        .register('sw.js')
        .catch(err=>console.log(err));
    });
}

</script>

</body>
</html>
