<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketing Department Statistics</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:     #07090f;
    --bg2:    #0c1020;
    --bg3:    #111827;
    --border: rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.12);
    --red:    #ff4d6d;
    --amber:  #ffb347;
    --cyan:   #00e5ff;
    --purple: #b06eff;
    --green:  #00e676;
    --pink:   #ff6eb4;
    --blue:   #4fc3f7;
    --teal:   #26ffb8;
    --orange: #ff8c42;
    --text:   #e8eaf0;
    --muted:  #6b7280;
    --dim:    #374151;
  }

  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Cairo',sans-serif;
    min-height:100vh;
  }

  /* ===== JOB TABLE ===== */
  .job-section{margin-top:40px;}

  .job-controls{
    display:flex;
    gap:10px;
    align-items:center;
    margin-bottom:15px;
  }

  .job-controls input{
    background:var(--bg3);
    border:1px solid var(--border);
    color:var(--text);
    padding:8px 12px;
    border-radius:8px;
  }

  .job-table{
    width:100%;
    border-collapse:collapse;
    background:var(--bg3);
    border:1px solid var(--border);
    border-radius:12px;
    overflow:hidden;
  }

  .job-table th,
  .job-table td{
    border:1px solid var(--border);
    padding:10px;
    text-align:center;
    font-size:.85rem;
  }

  .job-table th{
    background:rgba(176,110,255,.15);
    color:#c084fc;
    font-weight:800;
  }

  .job-subhead td{
    background:rgba(79,195,247,.08);
    color:var(--blue);
    font-weight:700;
  }

  /* (كل CSS الأصلي عندك يبقى كما هو بدون تغيير) */
</style>
</head>

<body>

<header class="header">
  <div class="header-brand">
    <div class="brand-icon">🎬</div>
    <div class="brand-text">
      <h1>Marketing Department Statistics</h1>
      <p>Production Dashboard · Real-time Stats</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="dot"></span>
    <span id="updateTime">Loading...</span><br/>
  </div>
</header>

<div class="container" id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>
</div>

<script>
google.charts.load('current');
google.charts.setOnLoadCallback(loadData);

const sheetID = "17I1gZX_N0_0QdswT6Hc13LJRezyz23J6v4aLjIeru8Q";

/* ===== DATA SYSTEM ===== */
const DATA = {};
let totalCalls = 0;
let doneCalls = 0;

function getValue(sheet, range, key) {
  totalCalls++;
  const q = new google.visualization.Query(
    `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&range=${range}`
  );

  q.send(res => {
    try {
      const t = res.getDataTable();
      DATA[key] = t.getValue(0,0);
    } catch {
      DATA[key] = "—";
    }
    doneCalls++;
    if(doneCalls >= totalCalls) renderUI();
  });
}

/* ===== LOAD DATA ===== */
function loadData(){

  getValue("Sheet1","I2","notEdit");
  getValue("Sheet1","J2","notApprove");
  getValue("Sheet1","K2","notPublished");

  getValue("Sheet1","I5","rymax_lbl");
  getValue("Sheet1","J5","mawaran_lbl");
  getValue("Sheet1","K5","rc_lbl");
  getValue("Sheet1","L5","client_lbl");

  getValue("Sheet1","I6","rymax_val");
  getValue("Sheet1","J6","mawaran_val");
  getValue("Sheet1","K6","rc_val");
  getValue("Sheet1","L6","client_val");

  getValue("Sheet1","I8","vid_this");
  getValue("Sheet1","K8","vid_prev");

  getValue("Sheet1","I11","dan_this");
  getValue("Sheet1","K11","dan_prev");

  getValue("Sheet1","I14","photo_this");
  getValue("Sheet1","K14","photo_prev");

  getValue("Sponsore","H4","s_rymax");
  getValue("Sponsore","I4","s_mawaran");
  getValue("Sponsore","J4","s_rc");
  getValue("Sponsore","K4","s_client");
  getValue("Sponsore","L4","s_total");

  getValue("Sponsore","H8","p_rymax");
  getValue("Sponsore","I8","p_mawaran");
  getValue("Sponsore","J8","p_rc");
  getValue("Sponsore","K8","p_client");
  getValue("Sponsore","L8","p_total");

  /* ===== JOB DATA (اختياري إذا تريد إضافته لاحقاً في DATA system) ===== */
}

/* ===== helper ===== */
function d(k){ return DATA[k] ?? "—"; }

/* ===== RENDER ===== */
function renderUI(){

  document.getElementById("updateTime").textContent =
    new Date().toLocaleString('ar-IQ');

  document.getElementById("app").innerHTML = `

    <!-- ===== YOUR ORIGINAL UI ===== -->

    <div class="sec-header">
      <div class="sec-icon purple">🎬</div>
      <h2 class="purple">Video Editing</h2>
      <div class="sec-line"></div>
    </div>

    <!-- (كل الأقسام الأصلية تبقى كما هي بدون تغيير) -->

    <div class="section-divider"></div>

    <!-- ===== SPONSOR ===== -->

    <div class="sec-header">
      <div class="sec-icon green">📢</div>
      <h2 class="green">Sponsore Ads</h2>
      <div class="sec-line"></div>
    </div>

    <!-- ===== 🔥 JOB SECTION ADDED ===== -->

    <div class="section-divider"></div>

    <div class="sec-header">
      <div class="sec-icon purple">🧑‍💼</div>
      <h2 class="purple">Job</h2>
      <div class="sec-line"></div>
    </div>

    <div class="job-section">

      <div class="job-controls">
        <label>📅 اختر التاريخ:</label>
        <input type="date" id="jobDate"/>
      </div>

      <div id="jobContainer">Loading...</div>

    </div>
  `;

  setTimeout(()=>{

    const input = document.getElementById("jobDate");

    const y = new Date();
    y.setDate(y.getDate() - 1);

    input.value = y.toISOString().split("T")[0];

    loadJobData(input.value);

    input.onchange = () => loadJobData(input.value);

  },500);
}

/* ===== JOB LOADER ===== */
function loadJobData(dateStr){

  const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=job`;

  const q = new google.visualization.Query(url);

  q.send(res => {

    const table = res.getDataTable();
    const cols = table.getNumberOfColumns();
    const rows = table.getNumberOfRows();

    let html = `<table class="job-table">`;

    // employees row
    html += `<tr>`;
    for(let c=0;c<cols;c+=2){
      html += `<th colspan="2">${table.getColumnLabel(c)}</th>`;
    }
    html += `</tr>`;

    // header row
    html += `<tr class="job-subhead">`;
    for(let c=0;c<cols;c+=2){
      html += `<td>📅 Date</td><td>📝 Job</td>`;
    }
    html += `</tr>`;

    // data rows
    for(let r=0;r<rows;r++){

      let show = false;

      for(let c=0;c<cols;c+=2){
        const v = table.getValue(r,c);
        if(v){
          const d = new Date(v).toISOString().split("T")[0];
          if(d === dateStr) show = true;
        }
      }

      if(!show) continue;

      html += `<tr>`;

      for(let c=0;c<cols;c+=2){
        html += `<td>${table.getValue(r,c) || ""}</td>`;
        html += `<td>${table.getValue(r,c+1) || ""}</td>`;
      }

      html += `</tr>`;
    }

    html += `</table>`;

    document.getElementById("jobContainer").innerHTML = html;

  });
}
</script>

</body>
</html>
