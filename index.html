<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>أقرب وكلاء رايماكس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --red:#cc0000;--red-dark:#990000;--red-light:#ff2222;
  --blue:#003087;--blue-dark:#001f5a;
  --white:#ffffff;--gray:#888;
  --shadow:0 8px 32px rgba(0,0,0,.18);
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;font-family:'Cairo',tahoma,sans-serif;}

/* SPLASH */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(145deg,var(--blue-dark) 0%,var(--blue) 50%,var(--red-dark) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .7s ease,visibility .7s ease;
}
#splash.hide{opacity:0;visibility:hidden;pointer-events:none;}
.splash-logo{width:140px;height:140px;object-fit:contain;border-radius:20px;
  animation:logoPop .6s cubic-bezier(.34,1.56,.64,1) both;
  filter:drop-shadow(0 8px 24px rgba(0,0,0,.5));}
.splash-logo-fallback{width:120px;height:120px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--red-dark));
  align-items:center;justify-content:center;font-size:48px;font-weight:900;color:#fff;
  animation:logoPop .6s cubic-bezier(.34,1.56,.64,1) both;display:none;}
.splash-title{color:#fff;font-size:20px;font-weight:700;margin:20px 0 6px;text-align:center;padding:0 20px;animation:fadeUp .5s .3s both;}
.splash-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:44px;animation:fadeUp .5s .4s both;}
.loader-wrap{display:flex;flex-direction:column;align-items:center;gap:14px;animation:fadeUp .5s .5s both;}
.gps-ring{position:relative;width:48px;height:48px;margin-bottom:4px;}
.gps-ring::before,.gps-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid rgba(255,255,255,.35);animation:ringPulse 2s ease-out infinite;}
.gps-ring::after{animation-delay:.7s;}
.gps-icon{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.loader-dots{display:flex;gap:10px;}
.loader-dots span{width:10px;height:10px;border-radius:50%;background:#fff;animation:dotBounce 1.2s ease-in-out infinite;}
.loader-dots span:nth-child(2){animation-delay:.18s;background:var(--red-light);}
.loader-dots span:nth-child(3){animation-delay:.36s;}
.loader-dots span:nth-child(4){animation-delay:.54s;background:var(--red-light);}
.loader-text{color:rgba(255,255,255,.7);font-size:13px;}

/* LAYOUT */
#app{display:flex;flex-direction:column;height:100%;opacity:0;transition:opacity .6s ease;}
#app.show{opacity:1;}
#map{flex:1;z-index:1;}

/* BOTTOM SHEET */
#sheet{
  position:fixed;bottom:0;left:0;right:0;
  height:42%;min-height:280px;max-height:70%;
  background:#fff;border-radius:22px 22px 0 0;
  box-shadow:0 -6px 40px rgba(0,0,0,.2);
  z-index:1000;display:flex;flex-direction:column;
}
.sheet-handle{width:40px;height:4px;background:#ddd;border-radius:4px;margin:10px auto 0;flex-shrink:0;cursor:grab;}
.sheet-header{
  padding:10px 16px 8px;
  background:linear-gradient(90deg,var(--blue-dark),var(--red-dark));
  border-radius:18px 18px 0 0;flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;
}
.sheet-title{color:#fff;font-size:14px;font-weight:700;}
.loc-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(255,255,255,.15);border-radius:20px;padding:3px 10px;color:rgba(255,255,255,.9);font-size:11px;}
.loc-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;box-shadow:0 0 0 3px rgba(74,222,128,.3);animation:glow 2s ease-in-out infinite;flex-shrink:0;}
.cards-wrap{flex:1;overflow-y:auto;padding:10px 12px 16px;display:flex;flex-direction:column;gap:10px;}
.cards-wrap::-webkit-scrollbar{width:4px;}
.cards-wrap::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}

/* CARD */
.card{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 3px 14px rgba(0,0,0,.1);border:1.5px solid #f0f0f0;animation:cardIn .45s cubic-bezier(.34,1.2,.64,1) both;}
.card:nth-child(1){animation-delay:.05s;}
.card:nth-child(2){animation-delay:.15s;}
.card:nth-child(3){animation-delay:.25s;}
.card:nth-child(4){animation-delay:.35s;}

.card-rank{background:linear-gradient(90deg,var(--blue-dark),var(--blue));color:#fff;padding:6px 12px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:space-between;}
.card-rank.gold{background:linear-gradient(90deg,#b8860b,#d4a017);}
.card-rank.purple{background:linear-gradient(90deg,#5a0080,#9c27b0);}
.dist-badge{background:rgba(255,255,255,.2);border-radius:20px;padding:2px 8px;font-size:10px;}

.card-body{padding:10px 12px 8px;display:flex;flex-direction:column;gap:5px;}
.dealer-name{font-size:15px;font-weight:800;color:#1a1a2e;line-height:1.3;}
.info-row{display:flex;align-items:flex-start;gap:6px;color:#555;font-size:12px;line-height:1.4;}
.info-icon{font-size:13px;flex-shrink:0;margin-top:1px;}

/* ACTIONS */
.card-actions{display:flex;gap:7px;padding:8px 12px 10px;}
.btn{
  flex:1;padding:9px 4px;border:none;border-radius:9px;
  text-decoration:none;color:#fff !important;cursor:pointer;
  font-family:'Cairo',tahoma,sans-serif;font-size:12px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:4px;
  transition:transform .15s,opacity .15s;
  -webkit-tap-highlight-color:transparent;
}
.btn:active{transform:scale(.94);opacity:.85;}
.btn-call{background:linear-gradient(135deg,#1a9e4a,#28a745);box-shadow:0 2px 8px rgba(40,167,69,.3);}
.btn-wa{background:linear-gradient(135deg,#128c7e,#25d366);box-shadow:0 2px 8px rgba(37,211,102,.3);}
.btn-map{background:linear-gradient(135deg,var(--blue-dark),var(--blue));box-shadow:0 2px 8px rgba(0,48,135,.3);}

.rc-note{margin:0 0 4px;padding:7px 10px;background:#fff3e0;border-radius:8px;border-right:3px solid #ff9800;font-size:11px;color:#e65100;font-weight:600;}

/* STATUS */
.status-box{padding:24px;text-align:center;}
.status-icon{font-size:40px;margin-bottom:8px;}
.status-title{font-size:15px;font-weight:700;color:#333;margin-bottom:4px;}
.status-msg{font-size:12px;color:var(--gray);line-height:1.6;}

/* MAP MARKERS */
.user-marker{width:32px;height:32px;border-radius:50%;background:var(--blue);border:3px solid #fff;box-shadow:0 2px 12px rgba(0,48,135,.5);display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;}
.dealer-marker{width:34px;height:34px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(0,0,0,.3);}
.dealer-marker span{transform:rotate(45deg);font-size:15px;}
.dm1{background:var(--red);}
.dm2{background:var(--blue);}
.dm3{background:#1a9e4a;}
.dm-rc{background:#9c27b0;}

@keyframes logoPop{from{opacity:0;transform:scale(.4);}to{opacity:1;transform:scale(1);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-12px);}}
@keyframes ringPulse{0%{transform:scale(1);opacity:.8;}100%{transform:scale(2.4);opacity:0;}}
@keyframes glow{0%,100%{box-shadow:0 0 0 3px rgba(74,222,128,.3);}50%{box-shadow:0 0 0 6px rgba(74,222,128,.1);}}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="splash-logo" src="logo.png" alt="Reimax"
    onerror="this.style.display='none';document.querySelector('.splash-logo-fallback').style.display='flex'">
  <div class="splash-logo-fallback">R</div>
  <div class="splash-title" id="splashTitle">أقرب وكلاء زيوت رايماكس</div>
  <div class="splash-sub" id="splashSub">جاري تحديد موقعك...</div>
  <div class="loader-wrap">
    <div class="gps-ring"><div class="gps-icon">📍</div></div>
    <div class="loader-dots"><span></span><span></span><span></span><span></span></div>
    <div class="loader-text" id="loaderText">يرجى السماح بالوصول إلى الموقع</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div id="map"></div>
  <div id="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <div class="sheet-title" id="sheetTitle">أقرب ٣ وكلاء</div>
      <div class="loc-badge"><span class="loc-dot"></span><span id="locLabel">تم تحديد موقعك</span></div>
    </div>
    <div class="cards-wrap" id="results"></div>
  </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbz7SGMpTNB4DjCIi7u5wf6qKKDBD5VaLXhLf5juB9WRUtqnZXk97EK6fvjj2P5noFHO/exec";
const MAX_DEALER_DIST = 50;

/* Kurdistan bounds */
const KURDISTAN=[
  {minLat:35.5,maxLat:37.4,minLng:43.2,maxLng:46.3},
  {minLat:34.5,maxLat:36.4,minLng:44.8,maxLng:46.6},
  {minLat:36.5,maxLat:37.8,minLng:42.2,maxLng:44.2},
];
function isKurdistan(lat,lng){return KURDISTAN.some(b=>lat>=b.minLat&&lat<=b.maxLat&&lng>=b.minLng&&lng<=b.maxLng);}

/* Translations */
const T={
  ar:{
    pageTitle:"أقرب وكلاء زيوت رايماكس",splashSub:"جاري تحديد موقعك...",
    loaderText:"يرجى السماح بالوصول إلى الموقع",locLabel:"تم تحديد موقعك",
    sheetTitle:"أقرب ٣ وكلاء",sheetTitleRC:"أقرب فرع RC",
    nearest:["الأقرب","الثاني","الثالث"],km:"كم",
    call:"اتصال",wa:"واتساب",map:"الخريطة",
    errTitle:"تعذر تحديد الموقع",errMsg:"يرجى السماح بالوصول إلى الموقع الجغرافي.",
    loading:"جاري تحميل البيانات...",
    noDealer:"لا يوجد وكيل قريب (ضمن 50 كم)",rcNote:"يعرض أقرب فرع RC",
    waMsg:"السلام عليكم , انا اتواصل معك عن طريق نظام شركة ماوران (رايماكس) الخاص باقرب عميل",
    rcCard:"بطاقة الشركة",userLoc:"موقعك",
  },
  ku:{
    pageTitle:"نزیکترین نوێنەرەکانی رایماکس",splashSub:"شوێنەکەت دادەنرێت...",
    loaderText:"تکایە ڕێگە بدە بە دەستڕاگەیشتن بە شوێن",locLabel:"شوێنەکەت دیاری کرا",
    sheetTitle:"نزیکترین ٣ نوێنەر",sheetTitleRC:"نزیکترین لقی RC",
    nearest:["نزیکترین","دووەم","سێیەم"],km:"کم",
    call:"پەیوەندی",wa:"واتساپ",map:"نەخشە",
    errTitle:"شوێن دیاری نەکرا",errMsg:"تکایە ڕێگە بدە بە دەستڕاگەیشتن بە شوێنی جوگرافی.",
    loading:"داتاکان بارکراون...",
    noDealer:"هیچ نوێنەرێک نزیک نییە (ناو ٥٠ کم)",rcNote:"نزیکترین لقی RC نیشان دەدرێت",
    waMsg:"سڵاو , من لە ڕێگەی سیستەمی کۆمپانیای ماوران (رایماکس) پەیوەندیت پێوە دەکەم",
    rcCard:"کارتی کۆمپانیا",userLoc:"شوێنی من",
  }
};

let lang="ar", userLat, userLng, leafMap;
/* Store items by index for button clicks */
const ITEMS={};

function t(k){return T[lang][k]||T.ar[k];}
function el(id){return document.getElementById(id);}

function applyLang(){
  document.documentElement.lang=lang==="ku"?"ckb":"ar";
  document.title=t("pageTitle");
  el("splashTitle").textContent=t("pageTitle");
  el("splashSub").textContent=t("splashSub");
  el("loaderText").textContent=t("loaderText");
  el("locLabel").textContent=t("locLabel");
  el("sheetTitle").textContent=t("sheetTitle");
}

function dist(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function cleanPhone(p){return String(p||"").replace(/\D/g,"");}
function waUrl(phone){
  return "https://wa.me/"+cleanPhone(phone)+"?text="+encodeURIComponent(t("waMsg"));
}

/* ── Map ── */
function initMap(){
  leafMap=L.map("map",{zoomControl:false}).setView([userLat,userLng],12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OSM",maxZoom:18}).addTo(leafMap);
  L.control.zoom({position:"topright"}).addTo(leafMap);
  const uIcon=L.divIcon({html:'<div class="user-marker">👤</div>',iconSize:[32,32],iconAnchor:[16,16],className:""});
  L.marker([userLat,userLng],{icon:uIcon}).addTo(leafMap).bindPopup("<b>"+t("userLoc")+"</b>",{closeButton:false});
}

function addDealerMarker(item,idx,isRC){
  const cls=isRC?"dm-rc":["dm1","dm2","dm3"][idx]||"dm2";
  const emoji=isRC?"🏢":["🥇","🥈","🥉"][idx]||"📍";
  const icon=L.divIcon({
    html:'<div class="dealer-marker '+cls+'"><span>'+emoji+'</span></div>',
    iconSize:[34,34],iconAnchor:[17,34],className:""
  });
  L.marker([parseFloat(item.lat),parseFloat(item.lng)],{icon})
    .addTo(leafMap)
    .bindPopup("<b>"+item.name+"</b><br><small>"+item.address+"</small>",{closeButton:false});
}

function fitBounds(items){
  const pts=[[userLat,userLng]].concat(items.map(d=>[parseFloat(d.lat),parseFloat(d.lng)]));
  leafMap.fitBounds(pts,{padding:[60,60]});
}

/* ── Build card HTML ── */
function buildCard(item, rankLabel, rankClass, distKm, mapUrl, key){
  ITEMS[key]=item;
  return '<div class="card">'
    +'<div class="card-rank '+rankClass+'">'
    +'<span>'+rankLabel+'</span>'
    +'<span class="dist-badge">📡 '+distKm+' '+t("km")+'</span>'
    +'</div>'
    +'<div class="card-body">'
    +'<div class="dealer-name">'+item.name+'</div>'
    +'<div class="info-row"><span class="info-icon">📍</span><span>'+item.address+'</span></div>'
    +'<div class="info-row"><span class="info-icon">📞</span><span>'+item.phone+'</span></div>'
    +'</div>'
    +'<div class="card-actions">'
    +'<a class="btn btn-call" href="tel:'+cleanPhone(item.phone)+'" data-key="'+key+'" data-act="Call">📞 '+t("call")+'</a>'
    +'<a class="btn btn-wa" href="'+waUrl(item.phone)+'" target="_blank" data-key="'+key+'" data-act="WhatsApp">💬 '+t("wa")+'</a>'
    +'<a class="btn btn-map" href="'+mapUrl+'" target="_blank" data-key="'+key+'" data-act="Map">🗺 '+t("map")+'</a>'
    +'</div>'
    +'</div>';
}

/* ── Render dealers ── */
function renderDealers(list){
  el("sheetTitle").textContent=t("sheetTitle");
  list.forEach((item,i)=>addDealerMarker(item,i,false));
  fitBounds(list);
  const icons=["🏆 ","🥈 ","🥉 "];
  const labels=t("nearest");
  const rankCls=["gold","",""];
  let html="";
  list.forEach((item,i)=>{
    const mapUrl="https://maps.google.com/?q="+item.lat+","+item.lng;
    html+=buildCard(item, icons[i]+labels[i], rankCls[i], item.distance.toFixed(1), mapUrl, "d"+i);
  });
  el("results").innerHTML=html;
  bindButtons();
}

/* ── Render RC fallback ── */
function renderRC(rc){
  el("sheetTitle").textContent=t("sheetTitleRC");
  addDealerMarker(rc,0,true);
  fitBounds([rc]);
  const mapUrl=rc.gmapProfile||"https://maps.google.com/?q="+rc.lat+","+rc.lng;

  /* RC branch card */
  let html='<div class="rc-note">⚠️ '+t("noDealer")+'</div>';
  html+=buildCard(rc, "🏢 "+t("sheetTitleRC"), "purple", rc.distance.toFixed(1), mapUrl, "rc0");

  /* Company card — use companyPhone if available */
  const cPhone=rc.companyPhone||rc.phone;
  const cItem={name:rc.companyName||rc.name, phone:cPhone, address:rc.companyAddress||rc.address, lat:rc.lat, lng:rc.lng};
  ITEMS["rc1"]=cItem;
  html+='<div class="card">'
    +'<div class="card-rank purple"><span>📋 '+t("rcCard")+'</span></div>'
    +'<div class="card-body">'
    +'<div class="dealer-name">'+cItem.name+'</div>'
    +'<div class="info-row"><span class="info-icon">📍</span><span>'+cItem.address+'</span></div>'
    +'<div class="info-row"><span class="info-icon">📞</span><span>'+cItem.phone+'</span></div>'
    +'</div>'
    +'<div class="card-actions">'
    +'<a class="btn btn-call" href="tel:'+cleanPhone(cItem.phone)+'" data-key="rc1" data-act="Call">📞 '+t("call")+'</a>'
    +'<a class="btn btn-wa" href="'+waUrl(cItem.phone)+'" target="_blank" data-key="rc1" data-act="WhatsApp">💬 '+t("wa")+'</a>'
    +'<a class="btn btn-map" href="'+mapUrl+'" target="_blank" data-key="rc1" data-act="Map">🗺 '+t("map")+'</a>'
    +'</div>'
    +'</div>';

  el("results").innerHTML=html;
  bindButtons();
}

/* ── Bind click events after render ── */
function bindButtons(){
  el("results").querySelectorAll(".btn[data-key]").forEach(function(btn){
    btn.addEventListener("click", function(){
      const key=this.getAttribute("data-key");
      const act=this.getAttribute("data-act");
      const item=ITEMS[key];
      if(item) saveAction(act, item);
    });
  });
}

/* ── App show/hide ── */
function showApp(){
  el("splash").classList.add("hide");
  el("app").classList.add("show");
  setTimeout(function(){leafMap&&leafMap.invalidateSize();},400);
}
function showError(msg){
  el("results").innerHTML='<div class="status-box"><div class="status-icon">📍</div>'
    +'<div class="status-title">'+t("errTitle")+'</div>'
    +'<div class="status-msg">'+(msg||t("errMsg"))+'</div></div>';
  showApp();
}

/* ── JSONP ── */
function jsonp(url){
  return new Promise(function(resolve,reject){
    const cb="__gas_"+Date.now();
    const script=document.createElement("script");
    const timer=setTimeout(function(){cleanup();reject(new Error("Timeout"));},15000);
    function cleanup(){delete window[cb];if(script.parentNode)script.parentNode.removeChild(script);clearTimeout(timer);}
    window[cb]=function(data){cleanup();resolve(data);};
    script.onerror=function(){cleanup();reject(new Error("Load error"));};
    script.src=url+(url.indexOf("?")>=0?"&":"?")+"callback="+cb;
    document.head.appendChild(script);
  });
}

/* ── Load data ── */
function loadData(){
  el("loaderText").textContent=t("loading");
  jsonp(API_URL).then(function(raw){
    var dealers=[], rcBranches=[];
    raw.forEach(function(d){
      d.distance=dist(userLat,userLng,parseFloat(d.lat),parseFloat(d.lng));
      if(d.isRC) rcBranches.push(d);
      else dealers.push(d);
    });
    dealers.sort(function(a,b){return a.distance-b.distance;});
    rcBranches.sort(function(a,b){return a.distance-b.distance;});
    var near=dealers.filter(function(d){return d.distance<=MAX_DEALER_DIST;}).slice(0,3);
    if(near.length>0) renderDealers(near);
    else if(rcBranches.length>0) renderRC(rcBranches[0]);
    else if(dealers.length>0) renderDealers(dealers.slice(0,3));
    else showError(t("errMsg"));
    showApp();
  }).catch(function(e){showError(e.message);showApp();});
}

/* ── Save action ── */
function saveAction(action, item){
  var d={
    action:action, name:item.name, phone:item.phone, address:item.address,
    clientLat:item.lat, clientLng:item.lng, userLat:userLat, userLng:userLng,
    distanceKm:dist(userLat,userLng,parseFloat(item.lat),parseFloat(item.lng)).toFixed(2),
    clientMap:"https://maps.google.com/?q="+item.lat+","+item.lng,
    userMap:"https://maps.google.com/?q="+userLat+","+userLng
  };
  fetch(API_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain"},body:JSON.stringify(d)}).catch(function(){});
}

/* ── Sheet drag ── */
(function(){
  var sheet=el("sheet"), startY, startH;
  var handle=sheet.querySelector(".sheet-handle");
  handle.addEventListener("touchstart",function(e){startY=e.touches[0].clientY;startH=sheet.offsetHeight;},{passive:true});
  handle.addEventListener("touchmove",function(e){
    var dy=startY-e.touches[0].clientY;
    var newH=Math.min(Math.max(startH+dy,180),window.innerHeight*.85);
    sheet.style.height=newH+"px";
    leafMap&&leafMap.invalidateSize();
  },{passive:true});
})();

/* ── Boot ── */
navigator.geolocation.getCurrentPosition(
  function(pos){
    userLat=pos.coords.latitude; userLng=pos.coords.longitude;
    lang=isKurdistan(userLat,userLng)?"ku":"ar";
    applyLang(); initMap(); loadData();
  },
  function(){applyLang(); initMap(); showError();},
  {timeout:12000,enableHighAccuracy:true}
);
</script>
</body>
</html>
