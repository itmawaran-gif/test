<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<script src="https://www.gstatic.com/charts/loader.js"></script>

<style>

body{
font-family:Arial;
direction:rtl;
text-align:center;
background:#f5f5f5;
}

.container{
width:900px;
margin:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-bottom:30px;
}

.box{
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

.title{
font-size:18px;
color:#666;
}

.value{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

.section{
margin-top:40px;
font-size:26px;
}

table{
margin:auto;
border-collapse:collapse;
}

td,th{
border:1px solid #ddd;
padding:10px 20px;
font-size:18px;
}

th{
background:#8b1538;
color:white;
}

</style>

<script>

google.charts.load('current');
google.charts.setOnLoadCallback(loadData);

const sheetID="17I1gZX_N0_0QdswT6Hc13LJRezyz23J6v4aLjIeru8Q";

function getValue(sheet,range,callback){

let query=new google.visualization.Query(
`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${sheet}&range=${range}`
);

query.send(function(res){

let data=res.getDataTable();
let value=data.getValue(0,0);

callback(value);

});

}

function loadData(){

// ====== Sheet1 ======

getValue("Sheet1","I2",v=>document.getElementById("notEdit").innerText=v);
getValue("Sheet1","J2",v=>document.getElementById("notApprove").innerText=v);
getValue("Sheet1","K2",v=>document.getElementById("notPublished").innerText=v);

getValue("Sheet1","I5",v=>document.getElementById("rymax").innerText=v);
getValue("Sheet1","J5",v=>document.getElementById("mawaran").innerText=v);
getValue("Sheet1","K5",v=>document.getElementById("rc").innerText=v);
getValue("Sheet1","L5",v=>document.getElementById("client").innerText=v);

getValue("Sheet1","I8",v=>document.getElementById("editedThisMonth").innerText=v);
getValue("Sheet1","K8",v=>document.getElementById("editedPrevMonth").innerText=v);

getValue("Sheet1","I11",v=>document.getElementById("danyarThis").innerText=v);
getValue("Sheet1","K11",v=>document.getElementById("danyarPrev").innerText=v);

getValue("Sheet1","I14",v=>document.getElementById("photoThis").innerText=v);
getValue("Sheet1","K14",v=>document.getElementById("photoPrev").innerText=v);


// ====== Sponsore ======

getValue("Sponsore","H4",v=>document.getElementById("s_rymax").innerText=v);
getValue("Sponsore","I4",v=>document.getElementById("s_mawaran").innerText=v);
getValue("Sponsore","J4",v=>document.getElementById("s_rc").innerText=v);
getValue("Sponsore","K4",v=>document.getElementById("s_client").innerText=v);
getValue("Sponsore","L4",v=>document.getElementById("s_total").innerText=v);

getValue("Sponsore","H8",v=>document.getElementById("p_rymax").innerText=v);
getValue("Sponsore","I8",v=>document.getElementById("p_mawaran").innerText=v);
getValue("Sponsore","J8",v=>document.getElementById("p_rc").innerText=v);
getValue("Sponsore","K8",v=>document.getElementById("p_client").innerText=v);
getValue("Sponsore","L8",v=>document.getElementById("p_total").innerText=v);

}

</script>

</head>

<body>

<div class="container">

<h2>Video Status</h2>

<div class="grid">

<div class="box">
<div class="title">Not Edit</div>
<div class="value" id="notEdit">0</div>
</div>

<div class="box">
<div class="title">Not Approve</div>
<div class="value" id="notApprove">0</div>
</div>

<div class="box">
<div class="title">Not Published</div>
<div class="value" id="notPublished">0</div>
</div>

</div>

<h2>Published 2026</h2>

<div class="grid">

<div class="box"><div class="title">Rymax</div><div class="value" id="rymax"></div></div>
<div class="box"><div class="title">Mawaran</div><div class="value" id="mawaran"></div></div>
<div class="box"><div class="title">RC</div><div class="value" id="rc"></div></div>
<div class="box"><div class="title">Client</div><div class="value" id="client"></div></div>

</div>

<h2>Video Editing</h2>

<table>
<tr>
<th>Edited this month</th>
<th>Edited Previous month</th>
</tr>

<tr>
<td id="editedThisMonth"></td>
<td id="editedPrevMonth"></td>
</tr>

<tr>
<th>By Danyar</th>
<th>Previous</th>
</tr>

<tr>
<td id="danyarThis"></td>
<td id="danyarPrev"></td>
</tr>

<tr>
<th>Photo this month</th>
<th>Photo Previous</th>
</tr>

<tr>
<td id="photoThis"></td>
<td id="photoPrev"></td>
</tr>

</table>


<h2 class="section">Sponsore Ads</h2>

<table>

<tr>
<th>Rymax</th>
<th>Mawaran</th>
<th>RC</th>
<th>Client</th>
<th>Total</th>
</tr>

<tr>
<td id="s_rymax"></td>
<td id="s_mawaran"></td>
<td id="s_rc"></td>
<td id="s_client"></td>
<td id="s_total"></td>
</tr>

<tr>
<th colspan="5">Previous Month</th>
</tr>

<tr>
<td id="p_rymax"></td>
<td id="p_mawaran"></td>
<td id="p_rc"></td>
<td id="p_client"></td>
<td id="p_total"></td>
</tr>

</table>

</div>

</body>
</html>
