<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketing Department Statistics</title>
<script src="https://www.gstatic.com/charts/loader.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
  :root {
    --bg:      #07090f;
    --bg2:     #0c1020;
    --bg3:     #111827;
    --border: rgba(255,255,255,0.07);
    --border2:rgba(255,255,255,0.12);
    --red:     #ff4d6d;
    --amber:   #ffb347;
    --cyan:    #00e5ff;
    --purple: #b06eff;
    --green:   #00e676;
    --pink:    #ff6eb4;
    --blue:    #4fc3f7;
    --teal:    #26ffb8;
    --orange: #ff8c42;
    --text:    #e8eaf0;
    --muted:   #6b7280;
    --dim:     #374151;
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Cairo',sans-serif;min-height:100vh;overflow-x:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
    background-size:40px 40px;pointer-events:none;z-index:0;
  }

  /* HEADER */
  .header{
    position:relative;z-index:10;
    background:linear-gradient(180deg,rgba(10,12,24,0.98),rgba(10,12,24,0.85));
    border-bottom:1px solid var(--border2);padding:18px 36px;
    display:flex;align-items:center;justify-content:space-between;
    backdrop-filter:blur(20px);
  }
  .header-brand{display:flex;align-items:center;gap:14px;}
  .brand-icon{
    width:44px;height:44px;
    background:linear-gradient(135deg,var(--purple),var(--cyan));
    border-radius:12px;display:flex;align-items:center;justify-content:center;
    font-size:1.3rem;flex-shrink:0;
  }
  .brand-text h1{
    font-size:1.15rem;font-weight:900;letter-spacing:.02em;
    background:linear-gradient(90deg,#c084fc,#67e8f9);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2;
  }
  .brand-text p{font-size:.7rem;color:var(--muted);font-weight:500;letter-spacing:.04em;}
  .header-meta{text-align:left;font-size:.72rem;color:var(--muted);line-height:1.7;}
  .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;
    background:var(--green);margin-left:6px;animation:pulse 2s ease-in-out infinite;
  }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(.8);}}

  /* CONTAINER */
  .container{
    position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:36px 24px 60px;
  }

  /* SECTION HEADER */
  .sec-header{display:flex;align-items:center;gap:14px;margin:40px 0 22px;}
  .sec-icon{
    width:46px;height:46px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;
  }
  .sec-icon.purple{background:rgba(176,110,255,.15);box-shadow:0 0 20px rgba(176,110,255,.2);}
  .sec-icon.green {background:rgba(0,230,118,.12); box-shadow:0 0 20px rgba(0,230,118,.15);}
  .sec-icon.orange{background:rgba(255,140,66,.12); box-shadow:0 0 20px rgba(255,140,66,.15);}
  .sec-header h2{font-size:2rem;font-weight:900;letter-spacing:.03em;}
  .sec-header h2.purple{color:#c084fc;}
  .sec-header h2.green {color:#86efac;}
  .sec-header h2.orange{color:var(--orange);}
  .sec-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent);}

  /* LOADING */
  .loading{text-align:center;padding:80px 20px;color:var(--muted);}
  .spinner{
    width:48px;height:48px;border:3px solid var(--dim);border-top-color:var(--purple);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* COMPARE CARDS */
  .compare-group{margin-top:24px;}
  .compare-label{
    font-size:1.1rem;font-weight:800;color:var(--muted);
    text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;
    display:flex;align-items:center;gap:8px;
  }
  .compare-label::before{content:'';width:16px;height:2px;background:var(--purple);border-radius:2px;display:inline-block;}
  .compare-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .compare-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:16px;
    overflow:hidden;animation:fadeUp .5s ease both;transition:transform .2s;
  }
  .compare-card:hover{transform:translateY(-2px);}
  .compare-card-head{
    padding:14px 22px;font-size:1.1rem;font-weight:700;letter-spacing:.04em;
    display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);
  }
  .compare-card.this-m .compare-card-head{background:rgba(176,110,255,.10);color:#c084fc;}
  .compare-card.prev-m .compare-card-head{background:rgba(79,195,247,.08); color:var(--blue);}
  .compare-card-body{display:flex;align-items:center;justify-content:center;padding:24px;}
  .cc-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:4.2rem;line-height:1;letter-spacing:.04em;}
  .this-m .cc-val{color:var(--purple);text-shadow:0 0 22px rgba(176,110,255,.4);}
  .prev-m .cc-val{color:var(--blue);  text-shadow:0 0 22px rgba(79,195,247,.3);}

  /* SPONSOR */
  .sponsor-block{
    background:var(--bg3);border:1px solid var(--border);
    border-radius:18px;overflow:hidden;animation:fadeUp .5s ease both;
  }
  .sponsor-head{
    padding:16px 24px;font-size:1.15rem;font-weight:800;letter-spacing:.04em;
    display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);
  }
  .sponsor-block.sp-this .sponsor-head{background:rgba(0,230,118,.08);color:var(--green);}
  .sponsor-block.sp-prev .sponsor-head{background:rgba(255,179,71,.08); color:var(--amber);}
  .sponsor-body{display:grid;grid-template-columns:repeat(5,1fr);padding:22px 24px;gap:8px;}
  .sp-item{text-align:center;padding:12px 4px; border-radius: 12px;}
  .sp-label{font-size:.9rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;}
  .sp-val{font-family:'Bebas Neue','Cairo',sans-serif;font-size:2.8rem;line-height:1;letter-spacing:.04em;}
  .sp-this .sp-val{color:var(--green);text-shadow:0 0 18px rgba(0,230,118,.3);}
  .sp-prev .sp-val{color:var(--amber);text-shadow:0 0 18px rgba(255,179,71,.3);}
  .sp-total .sp-label{color:var(--pink)!important;}
  .sp-total .sp-val{color:var(--pink)!important;font-size:3rem;text-shadow:0 0 22px rgba(255,110,180,.4)!important;}
  
  /* ADDED STYLES FOR DETAILS & MODAL */
  .details-btn {
    background: rgba(255,255,255,0.08); border: 1px solid var(--border2); color: var(--text);
    padding: 5px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 700;
    margin-right: auto; transition: 0.2s; font-family: 'Cairo', sans-serif;
  }
  .details-btn:hover { background: var(--purple); border-color: var(--purple); color: #fff;}
  .sp-this .details-btn:hover { background: var(--green); border-color: var(--green); }
  .sp-prev .details-btn:hover { background: var(--amber); border-color: var(--amber); }

  .cursor-pointer { cursor: pointer; transition: 0.3s; }
  .cursor-pointer:hover { transform: translateY(-3px); background: rgba(255,255,255,0.03); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
  .rv-text { font-size: 0.9rem; color: var(--cyan); margin-top: 8px; font-weight: 700; display:flex; align-items:center; justify-content:center; gap:5px;}

  /* Modal CSS */
  .modal {
    display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
  }
  .modal-content {
    background: var(--bg2); margin: 3% auto; padding: 25px; border: 1px solid var(--border2);
    border-radius: 16px; width: 95%; max-width: 900px; color: var(--text);
    animation: fadeUp 0.4s ease; display: flex; flex-direction: column; max-height: 90vh;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .close-btn { color: var(--muted); float: left; font-size: 32px; font-weight: bold; cursor: pointer; line-height: 1; margin-bottom: 10px;}
  .close-btn:hover { color: var(--red); }
  
  .table-container {
    overflow-y: auto; flex: 1; margin-top: 10px; border-radius: 8px;
    border: 1px solid var(--border2);
  }
  .modal-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem; }
  .modal-table th, .modal-table td { padding: 12px 15px; border-bottom: 1px solid var(--border2); }
  
  /* Sticky Header inside Table */
  .modal-table th { 
    position: sticky; top: 0; background: var(--bg3); color: var(--cyan); 
    font-weight: 800; border-bottom: 2px solid var(--border); z-index: 5;
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
  }
  .modal-table tr:hover { background: rgba(255,255,255,0.02); }
  
  /* Active Ad Color */
  .ongoing-ad td { color: var(--red); font-weight: 600; }

  /* JOB CARDS */
  .job-controls{
    display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;
    background:var(--bg3);padding:15px 25px;border-radius:15px;border:1px solid var(--border);
    animation:fadeUp .5s ease both;
  }
  .job-controls input{
    background:var(--bg);border:1px solid var(--purple);color:var(--text);
    padding:8px 15px;border-radius:8px;outline:none;font-family:inherit;
  }
  .job-controls input::-webkit-calendar-picker-indicator {
    cursor: pointer; filter: invert(65%) sepia(90%) saturate(400%) hue-rotate(180deg) brightness(100%) contrast(100%);
  }
  .job-grid{ display:grid;grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));gap:20px; }
  .job-emp-card{
    background:var(--bg3);border:1px solid var(--border);border-radius:16px;overflow:hidden;
    transition:0.3s;animation:fadeUp .5s ease both;
  }
  .job-emp-card:hover{border-color:var(--purple);transform:translateY(-2px);}
  .job-emp-name{
    background:rgba(176,110,255,0.1);padding:12px;text-align:center;
    font-weight:800;color:var(--purple);font-size:1.1rem;border-bottom:1px solid var(--border);
  }
  .job-work-text{
    padding:20px;min-height:100px;display:flex;align-items:center;justify-content:center;
    text-align:center;color:var(--cyan);font-weight:600;line-height:1.6;
  }

  .section-divider{height:1px;background:linear-gradient(90deg,transparent,var(--border2),transparent);margin:44px 0 0;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

  @media(max-width:700px){
    .compare-row, .sponsor-body, .job-grid{grid-template-columns:1fr;}
    .header{padding:14px 18px;}
    .cc-val{font-size:3rem;}
  }
</style>
</head>
<body>

<header class="header" dir="ltr">
  <div class="header-brand">
    <div class="brand-icon">🎬</div>
    <div class="brand-text">
      <h1>Marketing Department Statistics</h1>
      <p>Production Dashboard · Real-time Stats</p>
    </div>
  </div>
  <div class="header-meta">
    <span class="dot"></span>
    <span id="updateTime">Loading...</span><br/>
  </div>
</header>

<div class="container" id="app" dir="ltr">
  <div class="loading">
    <div class="spinner"></div>
    <p>Data loading...</p>
  </div>
</div>

<div id="dataModal" class="modal" dir="ltr">
  <div class="modal-content">
    <div>
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modalTitle" style="margin-bottom: 10px; color: var(--cyan); font-weight: 800; font-size: 1.4rem;"></h3>
    </div>
    <div class="table-container">
      <table id="modalTable" class="modal-table">
        <thead id="modalThead"></thead>
        <tbody id="modalTbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
google.charts.load('current', {'packages':['corechart']});
google.charts.setOnLoadCallback(loadData);

const sheetID = "17I1gZX_N0_0QdswT6Hc13LJRezyz23J6v4aLjIeru8Q";
const DATA = {};
let totalCalls = 0;
let doneCalls  = 0;

function getValue(sheet, range, key) {
  totalCalls++;
  const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&range=${range}`);
  q.send(function(res) {
    try {
      const table = res.getDataTable();
      const v = table ? table.getValue(0, 0) : null;
      DATA[key] = (v === null || v === undefined || v === '') ? '0' : v;
    } catch(e) { DATA[key] = '0'; }
    checkFinish();
  });
}

function fetchTableData(sheet, range, key) {
  totalCalls++;
  const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=${encodeURIComponent(sheet)}&range=${range}`);
  q.send(function(res) {
    try {
      DATA[key] = res.getDataTable();
    } catch(e) { DATA[key] = null; }
    checkFinish();
  });
}

function fetchJobData() {
  totalCalls++;
  const q = new google.visualization.Query(`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?sheet=job`);
  q.send(function(res) {
    try {
      DATA['jobTable'] = res.getDataTable();
    } catch(e) { DATA['jobTable'] = null; }
    checkFinish();
  });
}

function checkFinish() {
  doneCalls++;
  if (doneCalls >= totalCalls) renderUI();
}

function getYesterday() {
  const d = new Date();
  d.setDate(d.getDate() - 1);
  return formatDateOnly(d);
}

function formatDateOnly(date){
  if (!date) return '';
  const y = date.getFullYear();
  const m = String(date.getMonth()+1).padStart(2,'0');
  const d = String(date.getDate()).padStart(2,'0');
  return `${y}-${m}-${d}`;
}

// Function to abbreviate numbers (e.g., 1.5M, 15K)
function formatViews(num) {
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (num >= 1000) return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return num.toString();
}

function loadData() {
  // Video & Photo Stats
  getValue("Sheet1","I8",  "vid_this"); getValue("Sheet1","K8",  "vid_prev");
  getValue("Sheet1","I11", "dan_this"); getValue("Sheet1","K11", "dan_prev");
  getValue("Sheet1","I14", "photo_this"); getValue("Sheet1","K14", "photo_prev");
  
  // Sponsor data
  getValue("Sponsore","H4","s_rymax"); getValue("Sponsore","I4","s_mawaran");
  getValue("Sponsore","J4","s_rc"); getValue("Sponsore","K4","s_client"); getValue("Sponsore","L4","s_total");
  getValue("Sponsore","H8","p_rymax"); getValue("Sponsore","I8","p_mawaran");
  getValue("Sponsore","J8","p_rc"); getValue("Sponsore","K8","p_client"); getValue("Sponsore","L8","p_total");
  
  // Fetch Full Tables
  fetchTableData("Sheet1", "A:H", "sheet1_full");
  fetchTableData("Sponsore", "A:G", "sponsore_full");
  
  // Job Data
  fetchJobData();
}

function getMonthOffset(dateVal) {
  if (!dateVal) return -1;
  let d = dateVal;
  if (typeof d === 'string') {
    d = new Date(d);
    if (isNaN(d)) return -1;
  }
  const now = new Date();
  const mDiff = (now.getFullYear() - d.getFullYear()) * 12 + now.getMonth() - d.getMonth();
  return mDiff; 
}

// Filter data for Video Modal
function filterSheet1(monthOffset, type) {
  const dt = DATA['sheet1_full'];
  let rows = [];
  if (!dt) return rows;
  for (let i = 0; i < dt.getNumberOfRows(); i++) {
    const dateVal = dt.getValue(i, 0); 
    if (getMonthOffset(dateVal) === monthOffset) {
      const proj = dt.getValue(i, 1) || ''; 
      const page = dt.getValue(i, 5) || ''; 
      const danyar = dt.getValue(i, 6) || ''; 
      const kind = dt.getValue(i, 7) || ''; 

      let include = false;
      if (type === 'all') include = true;
      else if (type === 'danyar' && danyar.toString().trim() !== '') include = true;
      else if (type === 'photo' && kind.toString().toLowerCase().includes('photo')) include = true;

      if (include) {
        rows.push({
          cells: [dateVal ? formatDateOnly(dateVal) : '', proj, page, danyar, kind],
          isOngoing: false // Not applicable for videos
        });
      }
    }
  }
  return rows;
}

// Filter data and logic for Ongoing Ads in Sponsore
function getSponsorData(monthOffset, pageFilter) {
  const dt = DATA['sponsore_full'];
  let rows = [];
  let totalRV = 0;
  if (!dt) return {rows, totalRV};

  for (let i = 0; i < dt.getNumberOfRows(); i++) {
    const page = (dt.getValue(i, 0) || '').toString().toLowerCase(); 
    const site = dt.getValue(i, 1) || ''; 
    const amount = dt.getValue(i, 2) || 0; 
    const startDate = dt.getValue(i, 3); 
    const duration = dt.getValue(i, 4) || ''; 
    const note = dt.getValue(i, 5) || ''; 
    const rv = parseFloat(dt.getValue(i, 6)) || 0; 

    // Check if Ongoing
    let isOngoing = false;
    if (startDate instanceof Date && duration) {
        const days = parseInt(duration) || 0;
        const endDate = new Date(startDate.getTime());
        endDate.setDate(endDate.getDate() + days);
        const now = new Date();
        if (now < endDate) {
            isOngoing = true; // Ad hasn't finished yet
        }
    }

    if (getMonthOffset(startDate) === monthOffset) {
      let include = false;
      if (pageFilter === 'all') include = true;
      else if (page.includes(pageFilter.toLowerCase())) include = true;

      if (include) {
        rows.push({
          cells: [page.toUpperCase(), site, `$${amount}`, startDate ? formatDateOnly(startDate) : '', duration, note, rv],
          isOngoing: isOngoing
        });
        totalRV += rv;
      }
    }
  }
  return {rows, totalRV};
}

function openVideoModal(monthOffset, type, title) {
  const rows = filterSheet1(monthOffset, type);
  const headers = ['Date', 'Project', 'Page', 'Danyar', 'Type'];
  renderModal(title, headers, rows);
}

function openSponsorModal(monthOffset, pageFilter, title) {
  const data = getSponsorData(monthOffset, pageFilter);
  const headers = ['Page', 'Site', 'Amount', 'Start Date', 'Duration (days)', 'Note', 'Result View'];
  renderModal(title, headers, data.rows);
}

function renderModal(title, headers, rows) {
  document.getElementById('modalTitle').innerText = title;
  let theadHtml = '<tr>' + headers.map(h => `<th>${h}</th>`).join('') + '</tr>';
  document.getElementById('modalThead').innerHTML = theadHtml;
  
  let tbodyHtml = '';
  if (rows.length === 0) {
    tbodyHtml = `<tr><td colspan="${headers.length}" style="text-align:center; padding: 20px; color: var(--muted);">No data available</td></tr>`;
  } else {
    tbodyHtml = rows.map(r => {
      const rowClass = r.isOngoing ? 'class="ongoing-ad"' : '';
      return `<tr ${rowClass}>` + r.cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
    }).join('');
  }
  
  document.getElementById('modalTbody').innerHTML = tbodyHtml;
  document.getElementById('dataModal').style.display = 'block';
}

function closeModal() {
  document.getElementById('dataModal').style.display = 'none';
}
window.onclick = function(event) {
  if (event.target == document.getElementById('dataModal')) closeModal();
}

function renderUI() {
  const now = new Date().toLocaleString('en-US',{
    weekday:'short',year:'numeric',month:'short',day:'numeric', hour:'2-digit',minute:'2-digit'
  });
  document.getElementById('updateTime').textContent = now;

  // Pre-calculate Result Views for Sponsor Ads
  const s_rymax_rv = formatViews(getSponsorData(0, 'rymax').totalRV);
  const s_mawaran_rv = formatViews(getSponsorData(0, 'mawaran').totalRV);
  const s_rc_rv = formatViews(getSponsorData(0, 'rc').totalRV);
  const s_client_rv = formatViews(getSponsorData(0, 'client').totalRV);
  const s_total_rv = formatViews(getSponsorData(0, 'all').totalRV);

  const p_rymax_rv = formatViews(getSponsorData(1, 'rymax').totalRV);
  const p_mawaran_rv = formatViews(getSponsorData(1, 'mawaran').totalRV);
  const p_rc_rv = formatViews(getSponsorData(1, 'rc').totalRV);
  const p_client_rv = formatViews(getSponsorData(1, 'client').totalRV);
  const p_total_rv = formatViews(getSponsorData(1, 'all').totalRV);

  document.getElementById('app').innerHTML = `
    <div class="sec-header">
      <div class="sec-icon purple">🎬</div>
      <h2 class="purple">Video Editing</h2>
      <div class="sec-line"></div>
    </div>

    <div class="compare-group">
      <div class="compare-label">Edited Videos</div>
      <div class="compare-row">
        <div class="compare-card this-m">
          <div class="compare-card-head">
            <span>📅 Edited this month</span>
            <button class="details-btn" onclick="openVideoModal(0, 'all', 'Video Details - Current Month')">Details</button>
          </div>
          <div class="compare-card-body"><div class="cc-val">${DATA['vid_this']}</div></div>
        </div>
        <div class="compare-card prev-m">
          <div class="compare-card-head">
            <span>🗓️ Edited Previous month</span>
            <button class="details-btn" onclick="openVideoModal(1, 'all', 'Video Details - Previous Month')">Details</button>
          </div>
          <div class="compare-card-body"><div class="cc-val">${DATA['vid_prev']}</div></div>
        </div>
      </div>
    </div>

function renderJobCards(selectedDate) {
  const table = DATA['jobTable'];
  if (!table) return;

  const numCols = table.getNumberOfColumns();
  const numRows = table.getNumberOfRows();
  let cardsHtml = '';

  for (let j = 0; j < numCols; j += 2) {
    let empName = table.getColumnLabel(j);
    if (!empName || empName.includes('Column') || empName.trim() === "") continue;

    let todaysWork = "No work";
    
    for (let i = 0; i < numRows; i++) {
      let cellDate = table.getValue(i, j);
      if (cellDate instanceof Date) {
        let formattedDate = formatDateOnly(cellDate);
        if (formattedDate === selectedDate) {
          todaysWork = (table.getValue(i, j + 1) || "No work").toString().replace(/\n/g, "<br>");
          break;
        }
      }
    }

    cardsHtml += `
      <div class="job-emp-card">
        <div class="job-emp-name">${empName}</div>
        <div class="job-work-text">${todaysWork}</div>
      </div>
    `;
  }

  const container = document.getElementById('jobGridContainer');
  container.innerHTML = cardsHtml || '<p style="text-align:center; width:100%; color:var(--muted); padding:20px;">No employees found.</p>';
}
